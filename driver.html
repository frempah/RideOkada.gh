<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>OkadaRide — Driver Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a2a0a;display:flex;justify-content:center;min-height:100vh;font-family:'Nunito',sans-serif}
input,select{outline:none;font-family:'Nunito',sans-serif}
button{cursor:pointer;border:none;font-family:'Nunito',sans-serif}
::-webkit-scrollbar{display:none}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ping{0%{transform:scale(1);opacity:1}100%{transform:scale(2.2);opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes bounceIn{0%{transform:scale(0.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, onSnapshot, doc, updateDoc, addDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5pXIFi1txKGJ6Xs9Rndfmu4enIuONGDk",
  authDomain: "okadaride-a1ec9.firebaseapp.com",
  projectId: "okadaride-a1ec9",
  storageBucket: "okadaride-a1ec9.firebasestorage.app",
  messagingSenderId: "152050146022",
  appId: "1:152050146022:web:d3210fbd1a93c4e9813927",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Find driver by plate number
window.findDriver = async (plate) => {
  try {
    const q = query(collection(db, "driver_applications"), where("plate", "==", plate.toUpperCase()), where("status", "==", "approved"));
    const snap = await getDocs(q);
    if (snap.empty) return { success: false, error: "No approved driver found with this plate number. Make sure your application is approved." };
    const d = snap.docs[0];
    return { success: true, driver: { id: d.id, ...d.data() } };
  } catch(e) { return { success: false, error: "Connection error. Try again." }; }
};

// Save driver PIN
window.saveDriverPIN = async (driverId, pin) => {
  try {
    await updateDoc(doc(db, "driver_applications", driverId), { pin, pinSetAt: new Date().toISOString() });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Verify driver PIN
window.verifyDriverPIN = async (plate, pin) => {
  try {
    const q = query(collection(db, "driver_applications"), where("plate", "==", plate.toUpperCase()), where("status", "==", "approved"), where("pin", "==", pin));
    const snap = await getDocs(q);
    if (snap.empty) return { success: false, error: "Wrong PIN. Try again." };
    const d = snap.docs[0];
    return { success: true, driver: { id: d.id, ...d.data() } };
  } catch(e) { return { success: false, error: "Connection error. Try again." }; }
};

// Listen for new bookings for this driver
window.listenForBookings = (driverName, driverPlate, cb) => {
  try {
    const q = query(collection(db, "bookings"), orderBy("createdAt", "desc"));
    return onSnapshot(q, (snap) => {
      const bookings = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(b => b.driverName === driverName || b.driverPlate === driverPlate);
      cb(bookings);
    });
  } catch(e) { return () => {}; }
};

// Accept ride
window.acceptRide = async (bookingId, driverName) => {
  try {
    await updateDoc(doc(db, "bookings", bookingId), { status: "accepted", acceptedAt: new Date().toISOString(), acceptedBy: driverName });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Decline ride
window.declineRide = async (bookingId, driverName) => {
  try {
    await updateDoc(doc(db, "bookings", bookingId), { status: "declined", declinedAt: new Date().toISOString(), declinedBy: driverName });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Complete ride
window.completeRide = async (bookingId) => {
  try {
    await updateDoc(doc(db, "bookings", bookingId), { status: "completed", completedAt: new Date().toISOString() });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Update driver online status
window.setDriverStatus = async (driverId, online) => {
  try {
    await updateDoc(doc(db, "driver_applications", driverId), { online, lastSeen: new Date().toISOString() });
  } catch(e) {}
};

// WhatsApp passenger
window.whatsappPassenger = (phone, driverName, plate, pickup) => {
  const clean = phone.replace(/[^0-9]/g, "");
  const gh = clean.startsWith("0") ? "233"+clean.slice(1) : clean.startsWith("233") ? clean : "233"+clean;
  const msg = `✅ *OkadaRide — Your Ride is Confirmed!*\n\n`+
    `Driver *${driverName}* has accepted your booking!\n\n`+
    `🛺 Plate Number: *${plate}*\n`+
    `📍 Picking you up from: ${pickup}\n`+
    `⏱️ I am on my way now!\n\n`+
    `Please be ready at your pickup point.\n`+
    `_OkadaRide Ghana 🇬🇭 — Safe travels!_`;
  window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`, "_blank");
};

// Send chat message
window.sendChatMessage = async (bookingId, sender, senderName, text) => {
  try {
    await addDoc(collection(db, "bookings", bookingId, "messages"), {
      sender, senderName, text, createdAt: serverTimestamp()
    });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Listen to chat messages
window.listenChat = (bookingId, cb) => {
  try {
    const q = query(collection(db, "bookings", bookingId, "messages"), orderBy("createdAt", "asc"));
    return onSnapshot(q, snap => {
      cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  } catch(e) { return () => {}; }
};

window.firebaseReady = true;
console.log("✅ OkadaRide Driver Portal ready");
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const C = {
  primary: "#1B7A2F", primaryLight: "#27AE45", primaryDark: "#0D4A1A",
  red: "#CC0000", gold: "#FFB300",
  accentSoft: "rgba(27,122,47,.1)", bg: "#F2FAF3",
  text: "#0D2E14", textMid: "#3D6645", textLight: "#85A88C",
  success: "#00C853", danger: "#CC0000", border: "rgba(27,122,47,.15)",
};

const TukTuk = ({ size = 32, color = "#fff" }) => (
  <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
    <rect x="10" y="18" width="38" height="22" rx="5" fill={color} opacity="0.95"/>
    <rect x="14" y="10" width="28" height="10" rx="4" fill={color} opacity="0.8"/>
    <rect x="16" y="12" width="24" height="7" rx="2" fill="rgba(0,0,0,0.25)"/>
    <rect x="36" y="22" width="9" height="14" rx="2" fill="rgba(0,0,0,0.2)"/>
    <rect x="10" y="30" width="10" height="10" rx="2" fill={color} opacity="0.7"/>
    <circle cx="13" cy="36" r="2.5" fill="#FFE082"/>
    <circle cx="42" cy="42" r="7" fill="#1a1a1a" stroke={color} strokeWidth="2"/>
    <circle cx="42" cy="42" r="3" fill="#555"/>
    <circle cx="16" cy="42" r="5" fill="#1a1a1a" stroke={color} strokeWidth="2"/>
    <circle cx="16" cy="42" r="2" fill="#555"/>
  </svg>
);

const TopStripe = () => (
  <div style={{ position: "absolute", top: 0, left: 0, right: 0, display: "flex", height: 6, zIndex: 2 }}>
    <div style={{ flex: 1, background: C.red }}/><div style={{ flex: 1, background: C.gold }}/><div style={{ flex: 1, background: "#006400" }}/>
  </div>
);

const Spinner = ({ color = "#fff", size = 22 }) => (
  <div style={{ width: size, height: size, border: `3px solid rgba(255,255,255,.3)`, borderTop: `3px solid ${color}`, borderRadius: "50%", animation: "spin .8s linear infinite" }}/>
);

const Btn = ({ children, onClick, disabled, danger, ghost, style = {} }) => (
  <button onClick={onClick} disabled={disabled} style={{
    width: "100%", padding: "14px", borderRadius: 14, border: ghost ? `1.5px solid ${C.border}` : "none",
    background: disabled ? "#CBD5E0" : ghost ? "transparent" : danger ? `linear-gradient(135deg,${C.red},#8B0000)` : `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`,
    color: ghost ? C.primary : "#fff", fontWeight: 800, fontSize: 15,
    cursor: disabled ? "not-allowed" : "pointer",
    boxShadow: (!disabled && !ghost) ? `0 4px 18px rgba(27,122,47,.3)` : "none",
    display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
    transition: "all .2s", ...style
  }}>{children}</button>
);

// ── PIN INPUT ──────────────────────────────────────────────────────────────────
const PinInput = ({ value, onChange, label }) => {
  const refs = useRef([]);
  const digits = value.split("").concat(Array(4).fill("")).slice(0, 4);

  const handle = (i, val) => {
    if (!/^[0-9]?$/.test(val)) return;
    const arr = digits.map((d, idx) => idx === i ? val : d);
    onChange(arr.join("").slice(0, 4));
    if (val && i < 3) refs.current[i + 1]?.focus();
  };

  const handleKey = (i, e) => {
    if (e.key === "Backspace" && !digits[i] && i > 0) refs.current[i - 1]?.focus();
  };

  return (
    <div style={{ marginBottom: 20 }}>
      {label && <p style={{ fontWeight: 700, fontSize: 13, color: "rgba(255,255,255,.6)", marginBottom: 10, textAlign: "center" }}>{label}</p>}
      <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
        {digits.map((v, i) => (
          <input key={i} ref={el => refs.current[i] = el} value={v} type="password"
            onChange={e => handle(i, e.target.value)} onKeyDown={e => handleKey(i, e)} maxLength={1}
            style={{ width: 56, height: 64, textAlign: "center", fontSize: 24, fontWeight: 800, borderRadius: 14,
              border: `2px solid ${v ? C.primaryLight : "rgba(255,255,255,.2)"}`,
              background: v ? "rgba(27,122,47,.25)" : "rgba(255,255,255,.08)",
              color: "#fff", fontFamily: "'Nunito',sans-serif", outline: "none" }}/>
        ))}
      </div>
    </div>
  );
};

// ── LOGIN SCREEN ───────────────────────────────────────────────────────────────
function DriverLogin({ onLogin }) {
  const [step, setStep] = useState("plate"); // plate | pin | setpin | confirmpin
  const [plate, setPlate] = useState("");
  const [driver, setDriver] = useState(null);
  const [pin, setPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  // Check saved session
  useEffect(() => {
    const saved = localStorage.getItem("okada_driver");
    if (saved) { try { onLogin(JSON.parse(saved)); } catch(e) {} }
  }, []);

  const findDriver = async () => {
    if (!plate.trim()) { setError("Please enter your plate number"); return; }
    setLoading(true); setError("");
    const res = await window.findDriver?.(plate.trim()) ?? { success: false, error: "Not ready" };
    if (res.success) {
      setDriver(res.driver);
      setStep(res.driver.pin ? "pin" : "setpin");
    } else setError(res.error);
    setLoading(false);
  };

  const verifyPin = async () => {
    if (pin.length < 4) { setError("Enter your 4-digit PIN"); return; }
    setLoading(true); setError("");
    const res = await window.verifyDriverPIN?.(plate.trim(), pin) ?? { success: false, error: "Not ready" };
    if (res.success) {
      localStorage.setItem("okada_driver", JSON.stringify(res.driver));
      onLogin(res.driver);
    } else { setError(res.error); setPin(""); }
    setLoading(false);
  };

  const savePin = async () => {
    if (pin.length < 4) { setError("Choose a 4-digit PIN"); return; }
    setStep("confirmpin"); setError("");
  };

  const confirmAndSave = async () => {
    if (confirmPin !== pin) { setError("PINs don't match. Try again."); setConfirmPin(""); return; }
    setLoading(true);
    await window.saveDriverPIN?.(driver.id, pin);
    localStorage.setItem("okada_driver", JSON.stringify({ ...driver, pin }));
    onLogin({ ...driver, pin });
    setLoading(false);
  };

  return (
    <div style={{ minHeight: "100vh", background: `linear-gradient(135deg,${C.primaryDark},#0a2a0a)`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, position: "relative" }}>
      <div style={{ position: "fixed", top: 0, left: 0, right: 0, display: "flex", height: 6, zIndex: 10 }}>
        <div style={{ flex: 1, background: C.red }}/><div style={{ flex: 1, background: C.gold }}/><div style={{ flex: 1, background: "#006400" }}/>
      </div>
      <div style={{ maxWidth: 380, width: "100%", animation: "slideUp .5s ease" }}>
        {/* Logo */}
        <div style={{ textAlign: "center", marginBottom: 24 }}>
          <div style={{ display: "inline-flex", width: 76, height: 76, background: `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, borderRadius: 22, alignItems: "center", justifyContent: "center", marginBottom: 14, boxShadow: `0 8px 28px rgba(27,122,47,.4)` }}>
            <TukTuk size={44} color="#fff"/>
          </div>
          <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 26, fontWeight: 800, color: "#fff", marginBottom: 4 }}>OkadaRide</h1>
          <p style={{ color: C.gold, fontSize: 12, fontWeight: 700 }}>DRIVER PORTAL 🇬🇭</p>
        </div>

        <div style={{ background: "rgba(255,255,255,.06)", borderRadius: 24, padding: 28, border: "1px solid rgba(255,255,255,.1)" }}>

          {/* STEP 1 — Plate */}
          {step === "plate" && (
            <React.Fragment>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 44, marginBottom: 10 }}>🛺</div>
                <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 6 }}>Driver Login</h2>
                <p style={{ color: "rgba(255,255,255,.5)", fontSize: 13, lineHeight: 1.6 }}>Enter your tricycle plate number to get started.</p>
              </div>
              <div style={{ marginBottom: 16 }}>
                <p style={{ fontWeight: 700, fontSize: 13, color: "rgba(255,255,255,.6)", marginBottom: 8 }}>🛺 Plate Number</p>
                <input value={plate} onChange={e => setPlate(e.target.value.toUpperCase())} placeholder="e.g. M-24-BR-1535"
                  style={{ width: "100%", padding: "14px", borderRadius: 12, fontSize: 16, fontWeight: 800, letterSpacing: 2,
                    border: `1.5px solid ${error ? "rgba(204,0,0,.6)" : "rgba(255,255,255,.15)"}`,
                    background: "rgba(255,255,255,.08)", color: "#fff", fontFamily: "'Nunito',sans-serif", textTransform: "uppercase" }}
                  onKeyDown={e => e.key === "Enter" && findDriver()}/>
                {error && <p style={{ color: "#FF6B6B", fontSize: 12, fontWeight: 700, marginTop: 6 }}>⚠️ {error}</p>}
              </div>
              <button onClick={findDriver} disabled={loading} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: loading ? "rgba(255,255,255,.1)" : `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, color: "#fff", fontWeight: 800, fontSize: 16, cursor: loading ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10, boxShadow: loading ? "none" : `0 4px 20px rgba(27,122,47,.4)` }}>
                {loading ? <React.Fragment><Spinner/> Searching...</React.Fragment> : "Find My Account →"}
              </button>
              <div style={{ marginTop: 20, background: "rgba(255,179,0,.08)", border: "1px solid rgba(255,179,0,.2)", borderRadius: 12, padding: "12px 14px" }}>
                <p style={{ color: C.gold, fontSize: 12, fontWeight: 700, marginBottom: 4 }}>⚠️ First time here?</p>
                <p style={{ color: "rgba(255,255,255,.4)", fontSize: 12, lineHeight: 1.5 }}>Your application must be <strong style={{ color: "#fff" }}>approved</strong> by OkadaRide admin before you can log in. Contact us if you need help.</p>
              </div>
            </React.Fragment>
          )}

          {/* STEP 2 — Enter existing PIN */}
          {step === "pin" && driver && (
            <React.Fragment>
              <button onClick={() => { setStep("plate"); setPin(""); setError(""); }} style={{ background: "none", border: "none", color: "rgba(255,255,255,.5)", fontWeight: 700, fontSize: 13, marginBottom: 16, padding: 0, display: "flex", alignItems: "center", gap: 6 }}>← Back</button>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ width: 56, height: 56, borderRadius: "50%", background: `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, margin: "0 auto 12px" }}>🧑🏾</div>
                <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 18, fontWeight: 800, color: "#fff", marginBottom: 4 }}>Welcome back, {driver.fullName?.split(" ")[0]}!</h2>
                <p style={{ color: "rgba(255,255,255,.4)", fontSize: 13 }}>🛺 {driver.plate} · {driver.region}</p>
              </div>
              <PinInput value={pin} onChange={setPin} label="Enter your 4-digit PIN"/>
              {error && <p style={{ color: "#FF6B6B", fontSize: 13, fontWeight: 700, textAlign: "center", marginBottom: 12 }}>⚠️ {error}</p>}
              <button onClick={verifyPin} disabled={loading || pin.length < 4} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: loading || pin.length < 4 ? "rgba(255,255,255,.1)" : `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, color: "#fff", fontWeight: 800, fontSize: 16, cursor: loading || pin.length < 4 ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                {loading ? <React.Fragment><Spinner/> Verifying...</React.Fragment> : "Login →"}
              </button>
            </React.Fragment>
          )}

          {/* STEP 3 — Set new PIN */}
          {step === "setpin" && driver && (
            <React.Fragment>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 44, marginBottom: 10 }}>🔐</div>
                <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 6 }}>Hello, {driver.fullName?.split(" ")[0]}! 👋</h2>
                <p style={{ color: "rgba(255,255,255,.5)", fontSize: 13, lineHeight: 1.6 }}>First time logging in. Choose a <strong style={{ color: C.gold }}>4-digit PIN</strong> you'll remember — this keeps your account secure.</p>
              </div>
              <PinInput value={pin} onChange={setPin} label="Choose your 4-digit PIN"/>
              {error && <p style={{ color: "#FF6B6B", fontSize: 13, fontWeight: 700, textAlign: "center", marginBottom: 12 }}>⚠️ {error}</p>}
              <button onClick={savePin} disabled={pin.length < 4} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: pin.length < 4 ? "rgba(255,255,255,.1)" : `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, color: "#fff", fontWeight: 800, fontSize: 16, cursor: pin.length < 4 ? "not-allowed" : "pointer" }}>
                Continue →
              </button>
            </React.Fragment>
          )}

          {/* STEP 4 — Confirm PIN */}
          {step === "confirmpin" && (
            <React.Fragment>
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 44, marginBottom: 10 }}>🔐</div>
                <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 800, color: "#fff", marginBottom: 6 }}>Confirm your PIN</h2>
                <p style={{ color: "rgba(255,255,255,.5)", fontSize: 13 }}>Enter the same PIN again to confirm.</p>
              </div>
              <PinInput value={confirmPin} onChange={setConfirmPin} label="Re-enter your PIN"/>
              {error && <p style={{ color: "#FF6B6B", fontSize: 13, fontWeight: 700, textAlign: "center", marginBottom: 12 }}>⚠️ {error}</p>}
              <button onClick={confirmAndSave} disabled={loading || confirmPin.length < 4} style={{ width: "100%", padding: "15px", borderRadius: 14, border: "none", background: loading || confirmPin.length < 4 ? "rgba(255,255,255,.1)" : `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, color: "#fff", fontWeight: 800, fontSize: 16, cursor: loading || confirmPin.length < 4 ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                {loading ? <React.Fragment><Spinner/> Saving...</React.Fragment> : "Set PIN & Enter →"}
              </button>
            </React.Fragment>
          )}
        </div>
        <a href="https://frempah.github.io/okadaride-ghana" style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginTop: 20, color: "rgba(255,255,255,.3)", fontSize: 12, fontWeight: 700, textDecoration: "none" }}>← Back to OkadaRide App</a>
      </div>
    </div>
  );
}

// ── CHAT BOX ───────────────────────────────────────────────────────────────────
const DRIVER_QUICK = ["On my way! 🛺","I am at the pickup point 📍","Be there in 2 minutes ⏱️","Be there in 5 minutes ⏱️","I am stuck in traffic 🚦","Please come outside 🚶","Calling you now 📞","Ride completed ✅"];
const PASSENGER_QUICK = ["I am waiting outside 👋","I am on my way to pickup 🚶","Please wait 2 minutes ⏳","I can see you! 👀","Thank you driver! 🙏","Where are you? 📍","I am at the gate 🚪","Almost there! 🏃"];

function ChatBox({ bookingId, myId, myName, otherName, quickReplies }) {
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState("");
  const [sending, setSending] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => {
    if (!bookingId || !window.listenChat) return;
    const unsub = window.listenChat(bookingId, setMessages);
    return () => unsub?.();
  }, [bookingId]);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  const send = async (msg) => {
    if (!msg.trim()) return;
    setSending(true);
    await window.sendChatMessage?.(bookingId, myId, myName, msg.trim());
    setText("");
    setSending(false);
  };

  return (
    <div style={{ background: C.bg, borderRadius: 16, overflow: "hidden", border: `1px solid ${C.border}`, marginTop: 14 }}>
      {/* Chat header */}
      <div style={{ background: `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, padding: "10px 14px", display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 16 }}>💬</span>
        <p style={{ color: "#fff", fontWeight: 800, fontSize: 13 }}>Chat with {otherName}</p>
        <div style={{ marginLeft: "auto", width: 8, height: 8, borderRadius: "50%", background: C.gold, animation: "ping 1.5s ease-out infinite" }}/>
      </div>

      {/* Messages */}
      <div style={{ maxHeight: 220, overflowY: "auto", padding: "12px 12px 8px", display: "flex", flexDirection: "column", gap: 8 }}>
        {messages.length === 0 && (
          <div style={{ textAlign: "center", padding: "16px 0" }}>
            <p style={{ fontSize: 28, marginBottom: 6 }}>👋</p>
            <p style={{ color: C.textLight, fontSize: 13, fontWeight: 600 }}>No messages yet. Say hello!</p>
          </div>
        )}
        {messages.map(m => {
          const isMine = m.sender === myId;
          const ts = m.createdAt?.seconds ? new Date(m.createdAt.seconds * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "";
          return (
            <div key={m.id} style={{ display: "flex", flexDirection: "column", alignItems: isMine ? "flex-end" : "flex-start" }}>
              <div style={{ background: isMine ? `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})` : "#fff", color: isMine ? "#fff" : C.text, borderRadius: isMine ? "16px 16px 4px 16px" : "16px 16px 16px 4px", padding: "9px 13px", maxWidth: "80%", boxShadow: "0 1px 6px rgba(0,0,0,.08)", border: isMine ? "none" : `1px solid ${C.border}` }}>
                <p style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.4 }}>{m.text}</p>
              </div>
              <p style={{ fontSize: 10, color: C.textLight, marginTop: 3, fontWeight: 600 }}>{isMine ? "You" : m.senderName} {ts && `· ${ts}`}</p>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>

      {/* Quick replies */}
      <div style={{ padding: "6px 10px", display: "flex", gap: 6, overflowX: "auto", borderTop: `1px solid ${C.border}` }}>
        {quickReplies.map(q => (
          <button key={q} onClick={() => send(q)} style={{ background: C.accentSoft, color: C.primary, border: `1px solid rgba(27,122,47,.2)`, borderRadius: 20, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>{q}</button>
        ))}
      </div>

      {/* Input */}
      <div style={{ display: "flex", gap: 8, padding: "8px 10px", borderTop: `1px solid ${C.border}`, background: "#fff" }}>
        <input value={text} onChange={e => setText(e.target.value)} placeholder="Type a message..." onKeyDown={e => e.key === "Enter" && send(text)}
          style={{ flex: 1, padding: "10px 14px", borderRadius: 20, border: `1.5px solid ${C.border}`, fontSize: 14, fontFamily: "'Nunito',sans-serif", color: C.text, outline: "none" }}/>
        <button onClick={() => send(text)} disabled={!text.trim() || sending} style={{ width: 42, height: 42, borderRadius: "50%", border: "none", background: text.trim() ? `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})` : C.border, display: "flex", alignItems: "center", justifyContent: "center", cursor: text.trim() ? "pointer" : "not-allowed", flexShrink: 0 }}>
          <span style={{ fontSize: 18 }}>➤</span>
        </button>
      </div>
    </div>
  );
}

// ── BOOKING CARD ───────────────────────────────────────────────────────────────
function BookingCard({ booking, driverName, driverId, onAccept, onDecline, onComplete, updating }) {
  const [showChat, setShowChat] = useState(false);
  const ts = booking.createdAt?.seconds ? new Date(booking.createdAt.seconds * 1000).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : "Just now";
  const isNew = booking.status === "requested";
  const isAccepted = booking.status === "accepted";
  const isCompleted = booking.status === "completed";
  const isDeclined = booking.status === "declined";

  // Auto open chat when accepted
  useEffect(() => { if (isAccepted) setShowChat(true); }, [isAccepted]);

  return (
    <div style={{ background: "#fff", borderRadius: 20, border: `2px solid ${isNew ? C.gold : isAccepted ? C.success : isDeclined ? C.red : C.border}`, boxShadow: isNew ? `0 4px 24px rgba(255,179,0,.2)` : "0 2px 12px rgba(27,122,47,.06)", overflow: "hidden", marginBottom: 14, animation: "bounceIn .4s ease" }}>
      {/* Status bar */}
      <div style={{ background: isNew ? C.gold : isAccepted ? C.success : isDeclined ? C.red : "#888", padding: "8px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <p style={{ color: isNew ? "#000" : "#fff", fontWeight: 800, fontSize: 13 }}>
          {isNew ? "🔔 NEW RIDE REQUEST!" : isAccepted ? "✅ Ride Accepted" : isDeclined ? "❌ Declined" : "✓ Completed"}
        </p>
        <p style={{ color: isNew ? "rgba(0,0,0,.5)" : "rgba(255,255,255,.7)", fontSize: 12, fontWeight: 700 }}>{ts}</p>
      </div>

      <div style={{ padding: 16 }}>
        {/* Passenger */}
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${C.border}` }}>
          <div style={{ width: 44, height: 44, borderRadius: "50%", background: `linear-gradient(135deg,#4285F4,#1565C0)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>🧑🏾</div>
          <div style={{ flex: 1 }}>
            <p style={{ fontWeight: 800, fontSize: 15, color: C.text }}>{booking.passengerName || "Passenger"}</p>
            <p style={{ color: C.textMid, fontSize: 13, marginTop: 2 }}>📞 {booking.passengerPhone}</p>
          </div>
          <div style={{ background: booking.paymentMethod === "cash" ? "rgba(27,122,47,.1)" : "rgba(255,179,0,.12)", borderRadius: 10, padding: "6px 12px", textAlign: "center" }}>
            <p style={{ fontSize: 18 }}>{booking.paymentMethod === "cash" ? "💵" : "📱"}</p>
            <p style={{ fontSize: 10, fontWeight: 800, color: C.textMid, marginTop: 2 }}>{booking.paymentMethod === "cash" ? "Cash" : "MoMo"}</p>
          </div>
        </div>

        {/* Route */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
          {[["📍 Pickup", booking.pickup], ["🎯 Dropoff", booking.dropoff]].map(([l, v]) => (
            <div key={l} style={{ background: C.bg, borderRadius: 12, padding: "10px 12px" }}>
              <p style={{ color: C.textLight, fontSize: 10, fontWeight: 700, textTransform: "uppercase" }}>{l}</p>
              <p style={{ fontWeight: 700, fontSize: 13, color: C.text, marginTop: 3 }}>{v}</p>
            </div>
          ))}
        </div>

        <div style={{ background: C.accentSoft, borderRadius: 12, padding: "10px 14px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <p style={{ color: C.textMid, fontSize: 13, fontWeight: 600 }}>📍 {booking.region} Region</p>
          <p style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, color: C.primary, fontSize: 18 }}>GHS 7.00</p>
        </div>

        {/* NEW — Accept/Decline with chat option */}
        {isNew && (
          <React.Fragment>
            <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
              <button onClick={() => onAccept(booking)} disabled={updating} style={{ flex: 2, padding: "13px", borderRadius: 13, border: "none", background: updating ? "#CBD5E0" : `linear-gradient(135deg,${C.success},#006B2E)`, color: "#fff", fontWeight: 800, fontSize: 15, cursor: updating ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8, boxShadow: `0 4px 16px rgba(0,200,83,.3)` }}>
                {updating ? <Spinner size={18}/> : "✅ Accept Ride"}
              </button>
              <button onClick={() => onDecline(booking.id)} disabled={updating} style={{ flex: 1, padding: "13px", borderRadius: 13, border: "none", background: updating ? "#CBD5E0" : `linear-gradient(135deg,${C.red},#8B0000)`, color: "#fff", fontWeight: 800, fontSize: 14, cursor: updating ? "not-allowed" : "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                ❌ Decline
              </button>
            </div>
            <button onClick={() => setShowChat(v => !v)} style={{ width: "100%", padding: "10px", borderRadius: 12, border: `1.5px solid ${C.border}`, background: showChat ? C.accentSoft : "transparent", color: C.primary, fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
              {showChat ? "Hide Chat ▲" : "💬 Message Passenger ▼"}
            </button>
          </React.Fragment>
        )}

        {/* ACCEPTED — call, chat, complete */}
        {isAccepted && (
          <div style={{ display: "flex", gap: 10 }}>
            <a href={`tel:${booking.passengerPhone}`} style={{ flex: 1, textDecoration: "none" }}>
              <div style={{ background: `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, borderRadius: 13, padding: "13px", textAlign: "center", boxShadow: `0 4px 14px rgba(27,122,47,.3)` }}>
                <p style={{ color: "#fff", fontWeight: 800, fontSize: 14 }}>📞 Call</p>
              </div>
            </a>
            <button onClick={() => setShowChat(v => !v)} style={{ flex: 1, padding: "13px", borderRadius: 13, border: "none", background: showChat ? `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})` : C.accentSoft, color: showChat ? "#fff" : C.primary, fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
              💬 Chat
            </button>
            <button onClick={() => onComplete(booking.id)} style={{ flex: 1, padding: "13px", borderRadius: 13, border: "none", background: `linear-gradient(135deg,${C.gold},#e65100)`, color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer" }}>
              ✓ Done
            </button>
          </div>
        )}

        {isCompleted && (
          <div style={{ background: "rgba(0,200,83,.08)", border: `1px solid rgba(0,200,83,.25)`, borderRadius: 12, padding: "10px 14px", textAlign: "center" }}>
            <p style={{ color: "#006B2E", fontWeight: 800, fontSize: 14 }}>✅ Ride completed! Great work 💪</p>
          </div>
        )}

        {/* CHAT — shown when toggled or auto-opened on accept */}
        {showChat && (isNew || isAccepted) && (
          <ChatBox bookingId={booking.id} myId={`driver_${driverId}`} myName={driverName} otherName={booking.passengerName || "Passenger"} quickReplies={DRIVER_QUICK}/>
        )}
      </div>
    </div>
  );
}

// ── DASHBOARD ──────────────────────────────────────────────────────────────────
function DriverDashboard({ driver, onLogout }) {
  const [bookings, setBookings] = useState([]);
  const [online, setOnline] = useState(true);
  const [updating, setUpdating] = useState(null);
  const [tab, setTab] = useState("rides");
  const [toast, setToast] = useState(null);
  const prevCount = useRef(0);

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  // Go online/offline
  useEffect(() => {
    window.setDriverStatus?.(driver.id, true);
    return () => window.setDriverStatus?.(driver.id, false);
  }, []);

  // Listen for bookings
  useEffect(() => {
    if (!window.listenForBookings) return;
    const unsub = window.listenForBookings(driver.fullName, driver.plate, (newBookings) => {
      setBookings(newBookings);
      const newRequests = newBookings.filter(b => b.status === "requested").length;
      if (newRequests > prevCount.current) {
        showToast(`🔔 New ride request!`, "new");
      }
      prevCount.current = newRequests;
    });
    return () => unsub?.();
  }, [driver]);

  const handleAccept = async (booking) => {
    setUpdating(booking.id);
    const res = await window.acceptRide?.(booking.id, driver.fullName);
    if (res?.success) {
      showToast("✅ Ride accepted! Passenger notified.");
      window.whatsappPassenger?.(booking.passengerPhone, driver.fullName, driver.plate, booking.pickup);
    } else showToast("Failed to accept. Try again.", "error");
    setUpdating(null);
  };

  const handleDecline = async (id) => {
    setUpdating(id);
    await window.declineRide?.(id, driver.fullName);
    showToast("Ride declined.", "error");
    setUpdating(null);
  };

  const handleComplete = async (id) => {
    setUpdating(id);
    await window.completeRide?.(id);
    showToast("🎉 Ride marked complete!");
    setUpdating(null);
  };

  const toggleOnline = async () => {
    const next = !online;
    setOnline(next);
    await window.setDriverStatus?.(driver.id, next);
    showToast(next ? "✅ You are now Online" : "You are now Offline");
  };

  const newRides = bookings.filter(b => b.status === "requested");
  const activeRides = bookings.filter(b => b.status === "accepted");
  const pastRides = bookings.filter(b => b.status === "completed" || b.status === "declined");
  const earnings = bookings.filter(b => b.status === "completed").length * 7;

  return (
    <div style={{ width: "100%", maxWidth: 430, minHeight: "100vh", background: C.bg, position: "relative" }}>

      {/* Toast */}
      {toast && (
        <div style={{ position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)", zIndex: 200, background: toast.type === "new" ? C.gold : toast.type === "error" ? C.danger : C.success, color: toast.type === "new" ? "#000" : "#fff", borderRadius: 14, padding: "12px 20px", fontWeight: 800, fontSize: 14, boxShadow: "0 8px 24px rgba(0,0,0,.2)", animation: "slideUp .3s ease", whiteSpace: "nowrap", maxWidth: "90vw", textAlign: "center" }}>
          {toast.msg}
        </div>
      )}

      {/* Header */}
      <div style={{ background: `linear-gradient(135deg,${C.primaryDark},${C.primary})`, padding: "52px 20px 20px", position: "relative" }}>
        <TopStripe/>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16 }}>
          <div style={{ width: 48, height: 48, borderRadius: "50%", background: "rgba(255,255,255,.18)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, flexShrink: 0 }}>🧑🏾</div>
          <div style={{ flex: 1 }}>
            <p style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 17, color: "#fff", lineHeight: 1 }}>{driver.fullName}</p>
            <p style={{ color: "rgba(255,255,255,.5)", fontSize: 12, marginTop: 3 }}>🛺 {driver.plate} · {driver.region}</p>
          </div>
          {/* Online toggle */}
          <div onClick={toggleOnline} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer" }}>
            <div style={{ width: 50, height: 28, borderRadius: 14, background: online ? C.success : "rgba(255,255,255,.2)", position: "relative", transition: "background .3s", boxShadow: online ? `0 0 12px rgba(0,200,83,.5)` : "none" }}>
              <div style={{ position: "absolute", top: 3, left: online ? 24 : 3, width: 22, height: 22, borderRadius: "50%", background: "#fff", transition: "left .3s", boxShadow: "0 2px 6px rgba(0,0,0,.2)" }}/>
            </div>
            <p style={{ color: online ? C.success : "rgba(255,255,255,.4)", fontSize: 9, fontWeight: 800 }}>{online ? "ONLINE" : "OFFLINE"}</p>
          </div>
        </div>

        {/* Stats */}
        <div style={{ display: "flex", gap: 10 }}>
          {[
            [newRides.length, "New Rides", C.gold],
            [activeRides.length, "Active", C.success],
            [`GHS ${earnings}`, "Earned Today", "#fff"],
          ].map(([v, l, c]) => (
            <div key={l} style={{ flex: 1, background: "rgba(255,255,255,.1)", borderRadius: 14, padding: "10px 8px", textAlign: "center" }}>
              <p style={{ color: c, fontWeight: 800, fontSize: 16 }}>{v}</p>
              <p style={{ color: "rgba(255,255,255,.5)", fontSize: 10, fontWeight: 600, marginTop: 2 }}>{l}</p>
            </div>
          ))}
        </div>
      </div>

      {/* New ride alert banner */}
      {newRides.length > 0 && (
        <div style={{ background: C.gold, padding: "12px 20px", display: "flex", alignItems: "center", gap: 10, animation: "pulse 1.5s ease infinite" }}>
          <div style={{ position: "relative" }}>
            <div style={{ position: "absolute", inset: -6, borderRadius: "50%", background: "rgba(255,255,255,.3)", animation: "ping 1s ease-out infinite" }}/>
            <span style={{ fontSize: 22 }}>🔔</span>
          </div>
          <p style={{ fontWeight: 800, fontSize: 14, color: "#000" }}>{newRides.length} new ride request{newRides.length > 1 ? "s" : ""} waiting for you!</p>
        </div>
      )}

      {/* Tabs */}
      <div style={{ display: "flex", background: "#fff", borderBottom: `1px solid ${C.border}`, position: "sticky", top: 0, zIndex: 10 }}>
        {[["rides", `🔔 Rides${newRides.length > 0 ? ` (${newRides.length})` : ""}`], ["history", "📋 History"], ["profile", "👤 Profile"]].map(([key, label]) => (
          <button key={key} onClick={() => setTab(key)} style={{ flex: 1, padding: "13px 6px", border: "none", background: "none", cursor: "pointer", color: tab === key ? C.primary : C.textLight, fontWeight: tab === key ? 800 : 600, fontSize: 12, borderBottom: tab === key ? `3px solid ${C.primary}` : "3px solid transparent", transition: "all .2s" }}>
            {label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{ padding: "16px 16px 100px" }}>

        {/* RIDES TAB */}
        {tab === "rides" && (
          <div>
            {!online && (
              <div style={{ background: "rgba(204,0,0,.06)", border: `1px solid rgba(204,0,0,.2)`, borderRadius: 16, padding: "14px 16px", textAlign: "center", marginBottom: 16 }}>
                <p style={{ fontSize: 32, marginBottom: 6 }}>😴</p>
                <p style={{ fontWeight: 800, color: C.red, fontSize: 15 }}>You are Offline</p>
                <p style={{ color: C.textMid, fontSize: 13, marginTop: 4 }}>Toggle the switch above to go online and receive rides.</p>
              </div>
            )}
            {newRides.length === 0 && activeRides.length === 0 && online && (
              <div style={{ background: "#fff", borderRadius: 20, padding: 32, textAlign: "center", border: `1px solid ${C.border}`, marginBottom: 16 }}>
                <div style={{ position: "relative", width: 80, height: 80, margin: "0 auto 16px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ position: "absolute", inset: 0, borderRadius: "50%", background: C.accentSoft, animation: "ping 2s ease-out infinite" }}/>
                  <TukTuk size={44} color={C.primary}/>
                </div>
                <p style={{ fontWeight: 800, color: C.text, fontSize: 16 }}>Waiting for rides...</p>
                <p style={{ color: C.textMid, fontSize: 13, marginTop: 6, lineHeight: 1.6 }}>You're online and ready. New ride requests will appear here instantly.</p>
              </div>
            )}
            {[...newRides, ...activeRides].map(b => (
              <BookingCard key={b.id} booking={b} driverName={driver.fullName} driverId={driver.id} onAccept={handleAccept} onDecline={handleDecline} onComplete={handleComplete} updating={updating === b.id}/>
            ))}
          </div>
        )}

        {/* HISTORY TAB */}
        {tab === "history" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
              {[
                ["✅", "Completed", bookings.filter(b => b.status === "completed").length, "rgba(0,200,83,.1)", "#006B2E"],
                ["💰", "Total Earned", `GHS ${earnings}`, "rgba(27,122,47,.1)", C.primary],
                ["❌", "Declined", bookings.filter(b => b.status === "declined").length, "rgba(204,0,0,.08)", C.red],
                ["🛺", "Total Rides", bookings.length, C.accentSoft, C.primary],
              ].map(([icon, label, value, bg, color]) => (
                <div key={label} style={{ background: "#fff", borderRadius: 16, padding: 14, border: `1px solid ${C.border}` }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, marginBottom: 8 }}>{icon}</div>
                  <p style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: 20, color }}>{value}</p>
                  <p style={{ color: C.textMid, fontSize: 12, fontWeight: 600, marginTop: 2 }}>{label}</p>
                </div>
              ))}
            </div>
            {pastRides.length === 0 ? (
              <div style={{ background: "#fff", borderRadius: 20, padding: 32, textAlign: "center", border: `1px solid ${C.border}` }}>
                <p style={{ fontSize: 40, marginBottom: 10 }}>📋</p>
                <p style={{ fontWeight: 800, color: C.text }}>No ride history yet</p>
                <p style={{ color: C.textMid, fontSize: 13, marginTop: 4 }}>Completed and declined rides will appear here.</p>
              </div>
            ) : pastRides.map(b => (
              <BookingCard key={b.id} booking={b} driverName={driver.fullName} driverId={driver.id} onAccept={handleAccept} onDecline={handleDecline} onComplete={handleComplete} updating={updating === b.id}/>
            ))}
          </div>
        )}

        {/* PROFILE TAB */}
        {tab === "profile" && (
          <div>
            <div style={{ background: "#fff", borderRadius: 20, padding: 20, border: `1px solid ${C.border}`, marginBottom: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16, paddingBottom: 16, borderBottom: `1px solid ${C.border}` }}>
                <div style={{ width: 56, height: 56, borderRadius: "50%", background: `linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>🧑🏾</div>
                <div>
                  <p style={{ fontWeight: 800, fontSize: 16, color: C.text }}>{driver.fullName}</p>
                  <div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}>
                    <span style={{ background: "rgba(0,200,83,.1)", color: C.success, fontSize: 11, fontWeight: 800, padding: "3px 10px", borderRadius: 20 }}>✓ VERIFIED</span>
                    <span style={{ background: C.accentSoft, color: C.primary, fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20 }}>🛺 {driver.plate}</span>
                  </div>
                </div>
              </div>
              {[["📞", "Phone", driver.phone], ["🇬🇭", "Region", driver.region], ["📍", "Zone", driver.operatingZone], ["🎨", "Tricycle", `${driver.tricycleColor} (${driver.tricycleYear})`], ["📋", "Licence", driver.licenceNumber]].map(([icon, label, value]) => (
                <div key={label} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                  <span style={{ color: C.textMid, fontSize: 13, fontWeight: 600 }}>{icon} {label}</span>
                  <span style={{ color: C.text, fontWeight: 700, fontSize: 13 }}>{value || "—"}</span>
                </div>
              ))}
            </div>
            <div style={{ background: "rgba(255,179,0,.08)", border: "1px solid rgba(255,179,0,.2)", borderRadius: 16, padding: "14px 16px", marginBottom: 14 }}>
              <p style={{ fontWeight: 800, color: "#8B6000", fontSize: 13, marginBottom: 6 }}>💡 Tips for more rides</p>
              <p style={{ color: C.textMid, fontSize: 13, lineHeight: 1.6 }}>• Stay online during morning & evening rush hours<br/>• Accept rides quickly — passengers wait max 2 mins<br/>• Keep your phone charged always</p>
            </div>
            <button onClick={onLogout} style={{ width: "100%", padding: "14px", borderRadius: 14, border: "none", background: `linear-gradient(135deg,${C.red},#8B0000)`, color: "#fff", fontWeight: 800, fontSize: 15, cursor: "pointer", boxShadow: `0 4px 16px rgba(204,0,0,.3)` }}>
              🚪 Sign Out
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
function App() {
  const [driver, setDriver] = useState(null);

  useEffect(() => {
    const saved = localStorage.getItem("okada_driver");
    if (saved) { try { setDriver(JSON.parse(saved)); } catch(e) {} }
  }, []);

  const handleLogout = () => {
    localStorage.removeItem("okada_driver");
    window.setDriverStatus?.(driver?.id, false);
    setDriver(null);
  };

  return driver
    ? <DriverDashboard driver={driver} onLogout={handleLogout}/>
    : <DriverLogin onLogin={setDriver}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
