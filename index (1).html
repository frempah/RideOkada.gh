// ── PIN SECURITY ─────────────────────────────────────────────────────────────
// SHA-256 hash PINs before storing — browser built-in, no library needed
var hashPin = async function(pin){
  try{
    var msgBuffer = new TextEncoder().encode('okada_salt_2024_' + pin);
    var hashBuffer = await window.crypto.subtle.digest('SHA-256', msgBuffer);
    var hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
  }catch(e){
    // Fallback if crypto not available (very old browsers)
    return 'pin_' + pin + '_fallback';
  }
};

// Compare entered PIN against stored hash
var checkPin = async function(entered, storedHash){
  // Handle legacy plain-text PINs (existing users before hashing was added)
  if(storedHash && !storedHash.startsWith('0') && storedHash.length !== 64){
    return entered === storedHash; // plain text comparison for old accounts
  }
  var enteredHash = await hashPin(entered);
  return enteredHash === storedHash;
};

// ── SECURITY SYSTEM ──────────────────────────────────────────────────────────
// PIN Lockout — blocks brute force attacks
var SEC = {
  MAX_ATTEMPTS: 5,          // lock after 5 wrong PINs
  LOCKOUT_MINS: 30,         // locked for 30 minutes
  MAX_BOOKINGS_PER_HOUR: 3, // max 3 bookings per hour per user

  getLockout: function(key){
    try{
      var data = JSON.parse(localStorage.getItem('lock_'+key)||'{}');
      return data;
    }catch(e){ return {}; }
  },

  setLockout: function(key, data){
    try{ localStorage.setItem('lock_'+key, JSON.stringify(data)); }catch(e){}
  },

  // Check if account is locked — returns {locked, minsLeft}
  isLocked: function(key){
    var data = this.getLockout(key);
    if(!data.lockedUntil) return {locked:false, minsLeft:0};
    var now = Date.now();
    if(now < data.lockedUntil){
      var minsLeft = Math.ceil((data.lockedUntil - now) / 60000);
      return {locked:true, minsLeft:minsLeft};
    }
    // Lockout expired — clear it
    this.setLockout(key, {});
    return {locked:false, minsLeft:0};
  },

  // Record a failed attempt — returns {locked, attemptsLeft}
  recordFail: function(key){
    var data = this.getLockout(key);
    data.attempts = (data.attempts||0) + 1;
    data.lastAttempt = Date.now();
    if(data.attempts >= this.MAX_ATTEMPTS){
      data.lockedUntil = Date.now() + (this.LOCKOUT_MINS * 60 * 1000);
      data.attempts = 0;
      this.setLockout(key, data);
      return {locked:true, attemptsLeft:0};
    }
    this.setLockout(key, data);
    return {locked:false, attemptsLeft:this.MAX_ATTEMPTS - data.attempts};
  },

  // Clear attempts after successful login
  clearFails: function(key){
    this.setLockout(key, {});
  },

  // Check booking rate limit — returns {allowed, waitMins}
  checkBookingRate: function(phone){
    try{
      var key = 'brate_'+phone.replace(/\D/g,'');
      var data = JSON.parse(localStorage.getItem(key)||'{"bookings":[],"count":0}');
      var now = Date.now();
      var oneHourAgo = now - 3600000;
      // Remove bookings older than 1 hour
      data.bookings = (data.bookings||[]).filter(function(t){ return t > oneHourAgo; });
      if(data.bookings.length >= this.MAX_BOOKINGS_PER_HOUR){
        var oldest = data.bookings[0];
        var waitMins = Math.ceil((oldest + 3600000 - now) / 60000);
        return {allowed:false, waitMins:waitMins, count:data.bookings.length};
      }
      return {allowed:true, waitMins:0, count:data.bookings.length};
    }catch(e){ return {allowed:true, waitMins:0, count:0}; }
  },

  // Record a booking
  recordBooking: function(phone){
    try{
      var key = 'brate_'+phone.replace(/\D/g,'');
      var data = JSON.parse(localStorage.getItem(key)||'{"bookings":[]}');
      var now = Date.now();
      var oneHourAgo = now - 3600000;
      data.bookings = (data.bookings||[]).filter(function(t){ return t > oneHourAgo; });
      data.bookings.push(now);
      localStorage.setItem(key, JSON.stringify(data));
    }catch(e){}
  }
};

// ERROR BOUNDARY SYSTEM — OkadaRide Production Safety Net
// 
// Technical Architecture:
// ┌─────────────────────────────────────────────────┐
// │  GlobalErrorBoundary (wraps entire app)         │
// │  ┌───────────────────────────────────────────┐  │
// │  │  ScreenErrorBoundary (wraps each screen)  │  │
// │  │  ┌─────────────────────────────────────┐  │  │
// │  │  │  Screen Component (Home, BookRide)  │  │  │
// │  │  └─────────────────────────────────────┘  │  │
// │  └───────────────────────────────────────────┘  │
// └─────────────────────────────────────────────────┘
//
// Error flow:
// Component throws → ScreenBoundary catches → shows retry UI
// ScreenBoundary throws → GlobalBoundary catches → shows full error UI
// Async error → window handler catches → shows toast notification
// Network down → NetworkMonitor detects → shows offline banner
// ══════════════════════════════════════════════════════════════════════════════

// ── Error Logger ─────────────────────────────────────────────────────────────
// In production this would send to a service like Sentry or LogRocket
// For now we log to console and localStorage for debugging
var ErrorLogger = {
  logs: [],
  
  log: function(error, context, info){
    var entry = {
      timestamp: new Date().toISOString(),
      context:   context || 'unknown',
      message:   error && error.message ? error.message : String(error),
      stack:     error && error.stack ? error.stack.slice(0,500) : '',
      info:      info || '',
      appVersion:'2.0',
      userAgent: navigator.userAgent.slice(0,100)
    };
    this.logs.push(entry);
    // Keep only last 20 errors in memory
    if(this.logs.length > 20) this.logs.shift();
    // Persist to localStorage for debugging
    try{
      localStorage.setItem('okada_errors', JSON.stringify(this.logs.slice(-5)));
    }catch(e){}
    console.error('[OkadaRide Error]', entry.context, entry.message);
  },

  getLogs: function(){
    try{
      return JSON.parse(localStorage.getItem('okada_errors') || '[]');
    }catch(e){ return []; }
  },

  clear: function(){
    this.logs = [];
    try{ localStorage.removeItem('okada_errors'); }catch(e){}
  }
};

// ── Network Monitor ───────────────────────────────────────────────────────────
// Detects online/offline state and Firebase connectivity
var NetworkMonitor = {
  _listeners: [],
  isOnline: navigator.onLine,

  init: function(){
    var self = this;
    window.addEventListener('online',  function(){ 
      self.isOnline = true; 
      self._notify('online');
    });
    window.addEventListener('offline', function(){ 
      self.isOnline = false; 
      self._notify('offline');
    });
  },

  subscribe: function(fn){ this._listeners.push(fn); },
  unsubscribe: function(fn){ 
    this._listeners = this._listeners.filter(function(l){ return l !== fn; });
  },
  _notify: function(status){ 
    this._listeners.forEach(function(fn){ try{ fn(status); }catch(e){} }); 
  }
};
NetworkMonitor.init();

// ── Global Uncaught Error Handler ─────────────────────────────────────────────
// Catches any JS error that escapes try/catch blocks
window.onerror = function(message, source, lineno, colno, error){
  ErrorLogger.log(error || message, 'window.onerror', source+':'+lineno);
  return false; // Don't suppress the error
};

// ── Unhandled Promise Rejection Handler ───────────────────────────────────────
// Catches async errors like failed Firebase calls
window.addEventListener('unhandledrejection', function(event){
  ErrorLogger.log(event.reason, 'unhandledPromise', '');
  // Show a subtle toast instead of crashing

    'Something went wrong. Please try again.'
  );
});

// Wraps individual screens. If a screen crashes, shows retry button

var ScreenErrorBoundary = (function(){
  var Component = React.Component;
  
  function ScreenErrorBoundary(props){
    Component.call(this, props);
    this.state = { hasError: false, error: null, errorInfo: null };
    this.handleReset = this.handleReset.bind(this);
  }
  
  // Inherit from React.Component
  ScreenErrorBoundary.prototype = Object.create(Component.prototype);
  ScreenErrorBoundary.prototype.constructor = ScreenErrorBoundary;
  
  // Static method — called when error is thrown during render
  // Returns new state to show error UI
  ScreenErrorBoundary.getDerivedStateFromError = function(error){
    return { hasError: true, error: error };
  };
  
  // Called after error is caught — good place to log
  ScreenErrorBoundary.prototype.componentDidCatch = function(error, info){
    ErrorLogger.log(error, 'ScreenErrorBoundary:'+this.props.screenName, 
                    info && info.componentStack ? info.componentStack.slice(0,200) : '');
  };
  
  ScreenErrorBoundary.prototype.handleReset = function(){
    this.setState({ hasError: false, error: null, errorInfo: null });
  };
  
  ScreenErrorBoundary.prototype.render = function(){
    if(!this.state.hasError){
      return this.props.children;
    }

      )

  };
  
  return ScreenErrorBoundary;
})();

function Register(p){
  var _step = useState(1); var step = _step[0]; var setStep = _step[1];
  var _ph = useState(""); var phone = _ph[0]; var setPhone = _ph[1];
  var _otp = useState(""); var otp = _otp[0]; var setOtp = _otp[1];
  var _code = useState(""); var code = _code[0]; var setCode = _code[1];
  var _name = useState(""); var name = _name[0]; var setName = _name[1];
  var _pin = useState(""); var pin = _pin[0]; var setPin = _pin[1];
  var _url = useState(""); var photoUrl = _url[0]; var setPhotoUrl = _url[1];
  var _photo = useState(null); var photo = _photo[0]; var setPhoto = _photo[1];
  var _err = useState(""); var err = _err[0]; var setErr = _err[1];
  var _load = useState(false); var load = _load[0]; var setLoad = _load[1];
  var fref = useRef();

  var sendCode = async function(){
    if(phone.replace(/\D/g,"").length<9){ setErr("Enter a valid Ghana phone number"); return; }
    setLoad(true); setErr("");
    var c = String(Math.floor(100000 + Math.random()*900000));
    setCode(c);
    // Format to Ghana international number
    var gh = phone.replace(/\D/g,"");
    if(gh.startsWith("0")) gh = "233"+gh.slice(1);
    else if(!gh.startsWith("233")) gh = "233"+gh;
    // Send SMS via Hubtel Ghana API
    var smsUrl = "https://smsc.hubtel.com/v1/messages/send"
      +"?clientsecret=HUBTEL_SECRET"
      +"&clientid=HUBTEL_ID"
      +"&from=OkadaRide"
      +"&to="+gh
      +"&content="+encodeURIComponent("OkadaRide: Your verification code is "+c+". Valid 10 mins. Do not share.");
    var smsSent = false;
    try{
      var r = await fetch(smsUrl);
      if(r.ok){ smsSent = true; }
    }catch(e){ smsSent = false; }
    setLoad(false);
    setStep(2);
    if(!smsSent) setErr("sms_fail");
  };
  var verify = function(){
    if(otp === code){ setStep(3); setErr(""); }
    else{ setErr("Wrong code. Please try again."); setOtp(""); }
  };
  var pickPhoto = function(e){
    var f = e.target.files[0]; if(!f) return;
    setPhoto(f);
    DB.photoToB64(f).then(function(url){ setPhotoUrl(url); });
  };
  var finish = async function(){
    if(!name.trim()){ setErr("Enter your full name"); return; }
    if(!photo){ setErr("Photo is required — riders need to identify you"); return; }
    if(pin.length < 4){ setErr("Set a 4-digit PIN"); return; }
    setLoad(true); setErr("");
    var pinHash = await hashPin(pin);
    var u = {name:name.trim(), phone:phone.trim(), photoURL:photoUrl, pin:pinHash, createdAt:new Date().toISOString()};
    await DB.savePassenger(u);
    ls.set("okada_user", u);
    setLoad(false);
    p.done(u);
  };

  return h("div",{style:{minHeight:"100dvh",paddingBottom:50},className:"page"},
    h(PHdr,{back:function(){ p.done(null); }, title:"Create Account", sub:"Step "+step+" of 3"}),
    h("div",{style:{display:"flex",gap:4,padding:"10px 16px 0"}},
      [1,2,3].map(function(s){ return h("div",{key:s,style:{flex:1,height:4,borderRadius:4,background:step>=s?GOLD:"rgba(27,122,47,.1)",transition:"background .4s ease, transform .3s ease",transform:step>=s?"scaleY(1.3)":"scaleY(1)"}}); })
    ),
    h("div",{style:{padding:"20px 16px"}},
      step===1 && h("div",{className:"page"},
        h("div",{style:{background:"rgba(27,122,47,.06)",borderRadius:14,padding:"14px 16px",marginBottom:18,border:"1px solid rgba(27,122,47,.1)"}},
          h("p",{style:{fontWeight:700,fontSize:13,color:"#3D6645",lineHeight:1.6}},"📱 We'll send a verification code to confirm your Ghana phone number.")
        ),
        h(TInput,{label:"Phone Number",placeholder:"e.g. 0241234567",value:phone,onChange:function(e){setPhone(e.target.value);setErr("");},type:"tel",inputMode:"tel",autoComplete:"tel",onKey:function(e){if(e.key==="Enter")sendCode();}}),
        h(ErrMsg,{msg:err}),
        h(PBtn,{onClick:sendCode,dis:phone.replace(/\D/g,"").length<9,kids:"Send Verification Code →"}),
        h("p",{style:{textAlign:"center",marginTop:16,fontSize:13,color:"#85A88C"}},
          "Already registered? ",h("span",{onClick:function(){p.done(null);},style:{color:G,cursor:"pointer",fontWeight:800}},"Sign in →")
        )
      ),
      step===2 && h("div",{className:"page"},
        h("div",{style:{background:GRD,borderRadius:16,padding:"18px 16px",marginBottom:18,textAlign:"center",boxShadow:"0 6px 20px rgba(13,74,26,.3)"}},
          h("p",{style:{color:"rgba(255,255,255,.6)",fontSize:11,fontWeight:700,letterSpacing:1,marginBottom:8}},"YOUR VERIFICATION CODE"),
          h("p",{style:{fontFamily:"'Syne',sans-serif",fontSize:40,fontWeight:900,color:"#fff",letterSpacing:8}},code),
          h("p",{style:{color:"rgba(255,255,255,.5)",fontSize:12,marginTop:8}},"Enter the code below to verify "+phone)
        ),
        h(TInput,{label:"Enter 6-digit code",placeholder:"000000",value:otp,onChange:function(e){setOtp(e.target.value.replace(/\D/g,"").slice(0,6));setErr("");},type:"tel",inputMode:"numeric",style:{fontSize:22,fontWeight:800,textAlign:"center",letterSpacing:8},onKey:function(e){if(e.key==="Enter")verify();}}),
        h(ErrMsg,{msg:err}),
        h(PBtn,{onClick:verify,dis:otp.length<6,kids:"Verify & Continue →"}),
        h("p",{onClick:function(){setStep(1);setOtp("");setErr("");},style:{textAlign:"center",marginTop:12,fontSize:13,color:"#85A88C",cursor:"pointer"}},"← Use a different number")
      ),

        h("div",{style:{textAlign:"center",marginBottom:6}},
          h("div",{onClick:function(){fref.current&&fref.current.click();},style:{width:88,height:88,borderRadius:"50%",background:photoUrl?"transparent":"rgba(27,122,47,.08)",border:"3px dashed "+(photoUrl?G:BDR),display:"inline-flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",position:"relative"}},

      if(phone.replace(/\D/g,"").length<9){setErr("Enter a valid Ghana phone number");return;}
      if(!gender){setErr("Select your gender");return;}

      if(!plate.trim()){setErr("Enter your plate number");return;}
      if(!color){setErr("Select tricycle colour");return;}

function MapPicker(props){
  var _sq = useState(""); var sq = _sq[0]; var setSq = _sq[1];
  var _sr = useState([]); var sr = _sr[0]; var setSr = _sr[1];
  var mapRef    = useRef(null);
  var mapObj    = useRef(null);
  var markerRef = useRef(null);

  useEffect(function(){
    if(!mapRef.current) return;
    // Destroy old map if exists
    if(mapObj.current){
      try{ mapObj.current.remove(); }catch(e){}
      mapObj.current = null;
    }
    // Wait for DOM
    var t = setTimeout(function(){
      if(!mapRef.current) return;
      try{
        var lat = 7.3349, lng = -2.3267; // Sunyani center
        var m = window.L.map(mapRef.current, {
          center:[lat,lng], zoom:14,
          zoomControl:true, attributionControl:true
        });
        window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
          maxZoom:19,
          attribution:'© OpenStreetMap'
        }).addTo(m);

        // Pin icon
        var pinIcon = window.L.divIcon({
          html:'<div style="font-size:36px;line-height:1;filter:drop-shadow(0 3px 8px rgba(0,0,0,.5))">📍</div>',
          iconSize:[36,44], iconAnchor:[18,44], className:''
        });
        var marker = window.L.marker([lat,lng], {icon:pinIcon, draggable:true}).addTo(m);
        marker.bindPopup("Drag me or tap map").openPopup();
        markerRef.current = marker;
        mapObj.current = m;

        // Tap map to move marker
        m.on('click', function(e){
          marker.setLatLng(e.latlng);
          marker.closePopup();
        });

        // Force size recalculate
        setTimeout(function(){ try{m.invalidateSize();}catch(e){} }, 300);

        // Try GPS
        if(navigator.geolocation){
          navigator.geolocation.getCurrentPosition(
            function(pos){
              var glat=pos.coords.latitude, glng=pos.coords.longitude;
              m.setView([glat,glng], 16);
              marker.setLatLng([glat,glng]);
            },
            function(){},
            {enableHighAccuracy:true, timeout:8000, maximumAge:0}
          );
        }
      }catch(e){ console.error("Map init error:", e); }
    }, 400);

    return function(){
      clearTimeout(t);
      try{ if(mapObj.current){ mapObj.current.remove(); mapObj.current=null; } }catch(e){}
    };
  }, []);

  var doSearch = function(){
    if(!sq.trim()) return;
    fetch("https://nominatim.openstreetmap.org/search?format=json&q="+
          encodeURIComponent(sq+", Sunyani, Ghana")+"&limit=5&countrycodes=gh")
      .then(function(r){ return r.json(); })
      .then(function(data){ setSr(data); })
      .catch(function(){ setSr([]); });
  };

  var pickResult = function(r){
    if(!mapObj.current) return;
    var lat=parseFloat(r.lat), lng=parseFloat(r.lon);
    mapObj.current.setView([lat,lng], 16);
    if(markerRef.current) markerRef.current.setLatLng([lat,lng]);
    setSr([]); setSq(r.display_name.split(",")[0]);
    try{ mapObj.current.invalidateSize(); }catch(e){}
  };

  var confirm = function(){
    if(!markerRef.current){ alert("Please tap on the map to select a location first."); return; }
    var ll = markerRef.current.getLatLng();
    fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+ll.lat+"&lon="+ll.lng+"&zoom=16")
      .then(function(r){ return r.json(); })
      .then(function(data){
        var parts=[];
        if(data.address){
          if(data.address.road) parts.push(data.address.road);
          if(data.address.suburb) parts.push(data.address.suburb);
          else if(data.address.village) parts.push(data.address.village);
          else if(data.address.town) parts.push(data.address.town);
          else if(data.address.city) parts.push(data.address.city);
        }
        var name = parts.length>0 ? parts.join(", ") : data.display_name.split(",").slice(0,2).join(",").trim();
        props.onConfirm(name || "Selected Location");
      })
      .catch(function(){
        props.onConfirm("Location ("+ll.lat.toFixed(4)+", "+ll.lng.toFixed(4)+")");
      });
  };

  return h("div",{style:{position:"fixed",inset:0,zIndex:9000,display:"flex",flexDirection:"column",background:"#000"}},
    // Header
    h("div",{style:{background:GRD,flexShrink:0}},
      h(Ghana,null),
      h("div",{style:{padding:"12px 16px",display:"flex",alignItems:"center",gap:10}},
        h("button",{onClick:props.onClose,
          style:{background:"rgba(255,255,255,.18)",border:"none",color:"#fff",borderRadius:8,padding:"7px 12px",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}
        },"← Back"),
        h("div",{style:{flex:1}},
          h("p",{style:{color:"#fff",fontWeight:800,fontSize:15}},"🗺️ Pick "+(props.label||"Location")),
          h("p",{style:{color:"rgba(255,255,255,.6)",fontSize:11,marginTop:1}},"Tap on map or search to set location")
        )
      )
    ),
    // Search bar
    h("div",{style:{background:"#1a1a2e",padding:"10px 12px",flexShrink:0}},
      h("div",{style:{display:"flex",gap:8}},
        h("input",{
          value:sq,
          onChange:function(e){setSq(e.target.value);},
          placeholder:"Search e.g. Sunyani Market, Catholic Hospital...",
          onKeyDown:function(e){if(e.key==="Enter")doSearch();},
          style:{flex:1,padding:"10px 14px",borderRadius:10,fontSize:15,border:"none",background:"#fff",color:"#000",outline:"none"}
        }),
        h("button",{onClick:doSearch,
          style:{background:G,border:"none",borderRadius:10,padding:"10px 16px",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:15,flexShrink:0}
        },"🔍")
      ),
      sr.length>0&&h("div",{style:{marginTop:8,maxHeight:140,overflowY:"auto",borderRadius:8,overflow:"hidden"}},
        sr.map(function(r,i){
          return h("div",{key:i,onClick:function(){pickResult(r);},
            style:{background:"#fff",padding:"9px 12px",borderBottom:i<sr.length-1?"1px solid #eee":"none",cursor:"pointer",fontSize:13,color:"#000"}
          },r.display_name.split(",").slice(0,3).join(","));
        })
      )
    ),
    // Map
    h("div",{ref:mapRef,style:{flex:1,width:"100%",minHeight:0}}),
    // Confirm button
    h("div",{style:{background:"#1a1a2e",padding:"12px 14px",flexShrink:0}},
      h("p",{style:{color:"rgba(255,255,255,.55)",fontSize:11,textAlign:"center",marginBottom:8}},"📍 Drop pin on your location, then confirm"),
      h("button",{onClick:confirm,
        style:{width:"100%",padding:"14px",borderRadius:13,border:"none",background:GRD,color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer",boxShadow:"0 4px 14px rgba(13,74,26,.3)"}
      },"✅ Confirm "+(props.label||"Location"))
    )
  );
}


function Login(p){
  var _mode = useState("choose"); var mode = _mode[0]; var setMode = _mode[1];
  var _ph = useState(""); var phone = _ph[0]; var setPhone = _ph[1];
  var _pin = useState(""); var pin = _pin[0]; var setPin = _pin[1];
  var _plate = useState(""); var plate = _plate[0]; var setPlate = _plate[1];
  var _rpin = useState(""); var rpin = _rpin[0]; var setRpin = _rpin[1];
  var _np = useState(""); var np = _np[0]; var setNp = _np[1];
  var _cp = useState(""); var cp = _cp[0]; var setCp = _cp[1];
  var _rd = useState(null); var rd = _rd[0]; var setRd = _rd[1];
  var _rs = useState("plate"); var rs = _rs[0]; var setRs = _rs[1];
  var _err = useState(""); var err = _err[0]; var setErr = _err[1];
  var _load = useState(false); var load = _load[0]; var setLoad = _load[1];

  var loginPass = async function(){
    if(phone.replace(/\D/g,"").length<9){ setErr("Enter a valid phone number"); return; }
    if(pin.length<4){ setErr("Enter your 4-digit PIN"); return; }
    // Check lockout
    var lockKey = "pass_"+phone.replace(/\D/g,"");
    var lockStatus = SEC.isLocked(lockKey);
    if(lockStatus.locked){
      setErr("Account locked. Too many wrong PINs. Try again in "+lockStatus.minsLeft+" minute"+(lockStatus.minsLeft===1?"":"s")+".");
      setLoad(false); return;
    }
    setLoad(true); setErr("");
    var u = await DB.getPassenger(phone.trim());
    if(!u){ setErr("Not registered. Please register first."); setLoad(false); return; }
    var pinMatch = await checkPin(pin, u.pin);
    if(!pinMatch){
      var result = SEC.recordFail(lockKey);
      if(result.locked){
        setErr("Account locked for 30 minutes after too many wrong PINs.");
      } else {
        setErr("Wrong PIN. "+result.attemptsLeft+" attempt"+(result.attemptsLeft===1?"":"s")+" remaining before lockout.");
      }
      setPin(""); setLoad(false); return;
    }
    SEC.clearFails(lockKey);
    ls.set("okada_user", u);

function Tracking(p){
  var _st=useState("requested"); var status=_st[0]; var setStatus=_st[1];
  var _rl=useState(null); var riderLoc=_rl[0]; var setRiderLoc=_rl[1];
  var _ml=useState(null); var myLoc=_ml[0]; var setMyLoc=_ml[1];
  var _gErr=useState(""); var gpsErr=_gErr[0]; var setGpsErr=_gErr[1];
  var mapRef=useRef(null);
  var mapObj=useRef(null);
  var riderMarker=useRef(null);
  var myMarker=useRef(null);
  var routeLine=useRef(null);

  // Watch booking status + rider location
  useEffect(function(){
    if(!p.bookingId) return;
    var unsub=DB.watchRiderLocation(p.bookingId,function(loc){
      setStatus(loc.status);
      setRiderLoc({lat:loc.lat,lng:loc.lng});
      if(loc.status==="accepted"||loc.status==="completed") p.onAccepted();
    });
    return function(){ try{if(unsub)unsub();}catch(e){} };
  },[p.bookingId]);

  // Get passenger's own GPS location
  useEffect(function(){
    if(!navigator.geolocation){ setGpsErr("GPS not available on this device"); return; }
    var wid=navigator.geolocation.watchPosition(
      function(pos){
        setMyLoc({lat:pos.coords.latitude, lng:pos.coords.longitude});
        setGpsErr("");
      },
      function(err){
        if(err.code===1) setGpsErr("Please allow location access for live tracking");
        else setGpsErr("GPS signal weak — trying...");
      },
      {enableHighAccuracy:true, maximumAge:10000, timeout:15000}
    );
    return function(){ navigator.geolocation.clearWatch(wid); };
  },[]);

  // Init map when component mounts
  useEffect(function(){
    if(!mapRef.current || mapObj.current) return;
    // Sunyani default center
    var defaultLat=7.3349, defaultLng=-2.3267;
    try{
      var map=window.L.map(mapRef.current,{
        center:[defaultLat,defaultLng],
        zoom:14,
        zoomControl:true,
        attributionControl:false
      });
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        maxZoom:19
      }).addTo(map);
      mapObj.current=map;

      // Passenger marker (green)
      var myIcon=window.L.divIcon({
        html:'<div style="width:36px;height:36px;background:linear-gradient(135deg,#0D4A1A,#1B7A2F);border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 10px rgba(0,0,0,.3)">🧑🏾</div>',
        iconSize:[36,36],iconAnchor:[18,18],className:''
      });
      myMarker.current=window.L.marker([defaultLat,defaultLng],{icon:myIcon}).addTo(map);
      myMarker.current.bindPopup("<b>Your location</b>");

      // Rider marker (gold)
      var riderIcon=window.L.divIcon({
        html:'<div style="width:40px;height:40px;background:linear-gradient(135deg,#FFB300,#E65100);border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 10px rgba(0,0,0,.3)">🛺</div>',
        iconSize:[40,40],iconAnchor:[20,20],className:''
      });
      riderMarker.current=window.L.marker([defaultLat,defaultLng],{icon:riderIcon}).addTo(map);
      riderMarker.current.bindPopup("<b>Your Rider</b><br>"+(p.driver&&p.driver.name||""));
    }catch(e){ console.log("Map init error:",e); }

    return function(){
      try{ if(mapObj.current){ mapObj.current.remove(); mapObj.current=null; } }catch(e){}
    };
  },[]);

  // Update my location on map
  useEffect(function(){
    if(!mapObj.current||!myLoc||!myMarker.current) return;
    try{ myMarker.current.setLatLng([myLoc.lat,myLoc.lng]); }catch(e){}
  },[myLoc]);

  // Update rider location on map
  useEffect(function(){
    if(!mapObj.current||!riderLoc||!riderMarker.current) return;
    try{
      riderMarker.current.setLatLng([riderLoc.lat,riderLoc.lng]);
      // Draw route line between rider and passenger
      if(myLoc){
        if(routeLine.current){ routeLine.current.remove(); }
        routeLine.current=window.L.polyline(
          [[riderLoc.lat,riderLoc.lng],[myLoc.lat,myLoc.lng]],
          {color:'#1B7A2F',weight:4,opacity:.7,dashArray:'8,8'}
        ).addTo(mapObj.current);
        // Fit map to show both markers
        mapObj.current.fitBounds([
          [riderLoc.lat,riderLoc.lng],
          [myLoc.lat,myLoc.lng]
        ],{padding:[40,40]});
      }
    }catch(e){}
  },[riderLoc,myLoc]);

  var openGoogleMaps=function(){
    var dest=encodeURIComponent(p.pickup+", Sunyani, Ghana");
    window.open("https://www.google.com/maps/search/?api=1&query="+dest,"_blank");
  };

  var steps=[
    ["Booking Sent","Rider notified via WhatsApp 📱",true],
    ["Rider Accepted",(p.driver&&p.driver.name||"Rider")+" is on the way 🛺",status==="accepted"||status==="completed"],

  return h("div",{style:{minHeight:"100dvh",paddingBottom:40},className:"page"},
    h(PHdr,{back:p.onHome,
      title:status==="requested"?"⏳ Waiting for Rider...":"🎉 Rider Accepted!",

    }),
    h("div",{style:{padding:"14px 16px"}},

      // ── LIVE MAP

        h("div",{style:{background:GRD,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("p",{style:{color:"#fff",fontWeight:800,fontSize:14}},"📍 Live Tracking"),
          h("div",{style:{display:"flex",alignItems:"center",gap:6,background:"rgba(0,200,83,.2)",borderRadius:20,padding:"4px 10px"}},
            h("div",{style:{width:7,height:7,borderRadius:"50%",background:"#00C853"}}),
            h("p",{style:{color:"#00C853",fontSize:11,fontWeight:700}},riderLoc?"Live":"Waiting...")

        ),
        // Map container
        h("div",{ref:mapRef,style:{height:"220px",width:"100%",background:"#e8f5e9"}}),
        // Map legend
        h("div",{style:{padding:"10px 14px",display:"flex",gap:16,borderTop:"1px solid rgba(27,122,47,.08)"}},

          ),

        isDone && h("div",{style:{background:"rgba(0,200,83,.07)",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid rgba(0,200,83,.18)"}},h("p",{style:{color:"#006B2E",fontWeight:800,fontSize:13}},"✅ Completed! Earned GHS "+(fare*0.9).toFixed(2)+" 💪")),
        isDec  && h("div",{style:{background:"rgba(204,0,0,.05)",borderRadius:10,padding:"10px",textAlign:"center",border:"1px solid rgba(204,0,0,.1)"}},h("p",{style:{color:RED,fontWeight:700,fontSize:12}},"❌ Ride declined"))
      )
    );
  };

  return h("div",{style:{paddingBottom:20},className:"page"},
    toast&&h("div",{style:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:toast.type==="new"?GOLD:toast.type==="err"?RED:"#00C853",color:toast.type==="new"?"#000":"#fff",borderRadius:12,padding:"11px 18px",fontWeight:800,fontSize:13,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 5px 20px rgba(0,0,0,.25)"}},toast.msg),
    h("div",{style:{background:GRD,position:"sticky",top:0,zIndex:50,boxShadow:"0 2px 14px rgba(0,0,0,.2)"}},
      h(Ghana,null),
      h("div",{style:{padding:"13px 16px 0",display:"flex",alignItems:"center",gap:11}},
        h("div",{style:{width:48,height:48,borderRadius:"50%",background:"rgba(255,255,255,.15)",border:"2px solid rgba(255,255,255,.25)",overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          driver.photoURL?h("img",{src:driver.photoURL,style:{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}):h("span",{style:{fontSize:24}},"🧑🏾")
        ),
        h("div",{style:{flex:1}},
          h("p",{style:{color:"rgba(255,255,255,.55)",fontSize:11,fontWeight:600}},"Welcome back,"),
          h("p",{style:{fontFamily:"'Syne',sans-serif",color:"#fff",fontWeight:900,fontSize:19,lineHeight:1.1}},driver.fullName||driver.name||"Rider")
        ),
        h("p",{style:{color:GOLD,fontSize:12,fontWeight:700,marginRight:8}},"🛺 "+(driver.plate||"")),
        h("button",{onClick:p.onLogout,style:{background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.2)",color:"rgba(255,255,255,.75)",borderRadius:9,padding:"7px 11px",fontSize:12,fontWeight:700,cursor:"pointer"}},"Out")
      ),
      h("div",{style:{display:"flex",gap:7,padding:"12px 16px"}},
        [["GHS "+earned.toFixed(2),"Earned"],[done.length+"","Done"],[active.length+"","Active"]].map(function(row,i){
          return h("div",{key:i,style:{flex:1,background:"rgba(255,255,255,.1)",borderRadius:11,padding:"9px 7px",textAlign:"center"}},
            h("p",{style:{color:GOLD,fontWeight:900,fontSize:14,marginBottom:2}},row[0]),
            h("p",{style:{color:"rgba(255,255,255,.45)",fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.3}},row[1])
          );
        })
      )
    ),
    h("div",{style:{display:"flex",margin:"10px 14px 0",background:"#fff",borderRadius:12,padding:3,border:"1.5px solid rgba(27,122,47,.1)"}},
      [["rides","🛺 Rides"],["history","📋 History"]].map(function(row){
        var on = tab===row[0];
        return h("button",{key:row[0],onClick:function(){setTab(row[0]);},style:{flex:1,padding:"10px",borderRadius:10,border:"none",background:on?GRD:"transparent",color:on?"#fff":"#85A88C",fontWeight:700,fontSize:13,cursor:"pointer",transition:"all .25s"}},row[1]);
      })
    ),
    h("div",{style:{padding:"11px 14px"}},
      tab==="rides" && h("div",null,
        active.length===0 && h("div",{style:{textAlign:"center",padding:"44px 16px"}},
          h("div",{style:{fontSize:42,marginBottom:12,animation:"float 2s ease-in-out infinite"}},"🛺"),
          h("p",{style:{fontWeight:800,fontSize:16,color:"#0D2E14",marginBottom:6}},"Waiting for rides..."),
          h("p",{style:{color:"#85A88C",fontSize:13,lineHeight:1.6}},"New requests appear here automatically")
        ),
        active.map(BCard)
      ),
      tab==="history" && h("div",null,
        h("p",{style:{fontWeight:700,fontSize:11,color:"#85A88C",marginBottom:10,textTransform:"uppercase",letterSpacing:.5}},"Completed ("+done.length+")"),
        done.length===0 && h("p",{style:{color:"#85A88C",fontSize:13,textAlign:"center",padding:"20px 0"}},"No completed rides yet"),
        done.map(BCard)
      )
    )
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  var _splash = useState(true); var splash = _splash[0]; var setSplash = _splash[1];
  var _user   = useState(function(){ return ls.get("okada_user"); }); var user = _user[0]; var setUser = _user[1];
  var _driver = useState(function(){ return ls.get("okada_driver"); }); var driver = _driver[0]; var setDriver = _driver[1];
  var _mode   = useState("login"); var mode = _mode[0]; var setMode = _mode[1];
  var _tab    = useState("home"); var tab = _tab[0]; var setTab = _tab[1];
  var _flow   = useState("home"); var flow = _flow[0]; var setFlow = _flow[1];
  var _pu     = useState(""); var pickup = _pu[0]; var setPickup = _pu[1];
  var _do     = useState(""); var dropoff = _do[0]; var setDropoff = _do[1];
  var _fare   = useState(FARE); var fare = _fare[0]; var setFare = _fare[1];
  var _sel    = useState(null); var sel = _sel[0]; var setSel = _sel[1];
  var _pay    = useState("cash"); var pay = _pay[0]; var setPay = _pay[1];
  var _bid    = useState(""); var bid = _bid[0]; var setBid = _bid[1];

  var reset = function(){ setFlow("home"); setPickup(""); setDropoff(""); setSel(null); setBid(""); setFare(FARE); };

  if(splash)  return h(Splash, {done:function(){setSplash(false);}});
  if(driver)  return h(RiderDash, {driver:driver, onLogout:function(){ls.rm("okada_driver");setDriver(null);}});
  if(mode==="register")   return h(Register,   {done:function(u){ if(u){setUser(u);setMode("login");}else setMode("login"); }});
  if(mode==="riderapply") return h(RiderApply, {done:function(){ setMode("login"); }});
  if(!user)   return h(Login,  {onPass:function(u){setUser(u);}, onRider:function(d){setDriver(d);}, onReg:function(){setMode("register");}, onRiderReg:function(){setMode("riderapply");}});

  return h("div",null,
    flow==="home" && h("div",null,
      tab==="home"    && h(Home,    {user:user, goBook:function(pu,do_,f){setPickup(pu);setDropoff(do_);setFare(f);setFlow("booking");}, signOut:function(){ls.rm("okada_user");setUser(null);}}),
      tab==="trips"   && h(Trips,   {user:user}),
      tab==="profile" && h(Profile, {user:user, signOut:function(){ls.rm("okada_user");setUser(null);}}),
      h(Nav, {tab:tab, go:function(t){setTab(t);}})
    ),
    flow==="booking"  && h(BookRide, {user:user, pickup:pickup, dropoff:dropoff, fare:fare, onBack:function(){setFlow("home");}, onConfirm:function(d,pm,id,f){setSel(d);setPay(pm);setBid(id);setFare(f);setFlow("tracking");}}),
    flow==="tracking" && h(Tracking, {user:user, bookingId:bid, driver:sel, pickup:pickup, dropoff:dropoff, pay:pay, fare:fare, onAccepted:function(){setFlow("home");}, onHome:function(){setFlow("home");}, onCancel:reset})
  );
}

document.addEventListener('focusin', function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA'){
    setTimeout(function(){ e.target.scrollIntoView({block:'center',behavior:'smooth'}); }, 380);
  }
});

window.addEventListener('load', function(){
  try{
    ReactDOM.createRoot(document.getElementById('root')).render(
      h(GlobalErrorBoundary, null,
        h(NetworkBanner, null),
        h(ErrorToast, null),
        h(App, null)
      )
    );
  }catch(e){
    console.error('Boot error:', e);
    document.getElementById('root').innerHTML = '<div style="height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0D4A1A;padding:24px;text-align:center"><div style="font-size:52px;margin-bottom:16px">🛺</div><h2 style="color:#fff;font-family:sans-serif;font-size:22px;margin-bottom:10px">OkadaRide</h2><p style="color:rgba(255,255,255,.6);font-size:14px;margin-bottom:22px">Please reload the app.</p><button onclick="location.reload()" style="background:#FFB300;border:none;border-radius:14px;padding:14px 28px;color:#000;font-weight:800;font-size:16px;cursor:pointer">🔄 Reload</button></div>';
  }
});
</script>
