// ── FIREBASE FUNCTIONS ────────────────────────────────────────────────────────
window.savePassenger=async function(data){
  try{
    const snap=await db.collection("passengers").where("phone","==",data.phone).get();
    if(!snap.empty){
      await db.collection("passengers").doc(snap.docs[0].id).update({...data,updatedAt:new Date().toISOString()});
      return{success:true,id:snap.docs[0].id};
    }
    const r=await db.collection("passengers").add({...data,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    return{success:true,id:r.id};
  }catch(e){console.error("savePassenger:",e);return{success:false};}
};

window.getPassenger=async function(phone){
  try{
    const snap=await db.collection("passengers").where("phone","==",phone).get();
    if(snap.empty)return null;
    return{id:snap.docs[0].id,...snap.docs[0].data()};
  }catch(e){return null;}
};

window.saveBooking=async function(data){
  try{
    const r=await db.collection("bookings").add({...data,status:"requested",createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    return{success:true,id:r.id};
  }catch(e){return{success:false};}
};

window.saveScheduledBooking=async function(data){
  try{
    const r=await db.collection("scheduled_bookings").add({...data,status:"scheduled",createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    return{success:true,id:r.id};
  }catch(e){return{success:false};}
};

window.fetchApprovedDrivers=async function(region){
  try{
    const snap=await db.collection("driver_applications").where("status","==","approved").get();
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){return[];}
};

window.listenBookingStatus=function(bookingId,cb){
  try{
    return db.collection("bookings").doc(bookingId).onSnapshot(snap=>{
      if(snap.exists)cb({id:snap.id,...snap.data()});
    });
  }catch(e){return function(){};}
};

window.sendChatMessage=async function(bookingId,sender,senderName,text){
  try{
    await db.collection("bookings").doc(bookingId).collection("messages").add({
      sender,senderName,text,createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    return{success:true};
  }catch(e){return{success:false};}
};

window.listenChat=function(bookingId,cb){
  try{
    return db.collection("bookings").doc(bookingId).collection("messages")
      .orderBy("createdAt","asc").onSnapshot(snap=>{
        cb(snap.docs.map(d=>({id:d.id,...d.data()})));
      });
  }catch(e){return function(){};}
};

window.getMyRides=async function(phone){
  try{
    const snap=await db.collection("bookings").where("passengerPhone","==",phone).get();
    return snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  }catch(e){return[];}
};

window.rateDriver=async function(bookingId,driverId,drivingRating,communicationRating,comment){
  try{
    await db.collection("bookings").doc(bookingId).update({drivingRating,communicationRating,ratingComment:comment,rated:true});
    return{success:true};
  }catch(e){return{success:false};}
};

window.listenForBookings=function(driverName,plate,cb){
  try{
    return db.collection("bookings").where("driverName","==",driverName)
      .onSnapshot(snap=>{
        const bookings=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        cb(bookings);
      });
  }catch(e){console.error("listenForBookings:",e);return function(){};}
};

window.listenForBookingsByPlate=function(plate,cb){
  try{
    return db.collection("bookings").where("driverPlate","==",plate)
      .onSnapshot(snap=>{
        const bookings=snap.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        cb(bookings);
      });
  }catch(e){return function(){};}
};

window.findDriver=async function(plate){
  try{
    const snap=await db.collection("driver_applications")
      .where("plate","==",plate.toUpperCase())
      .where("status","==","approved").get();
    if(snap.empty)return{success:false,error:"No approved rider found with this plate number."};
    return{success:true,driver:{id:snap.docs[0].id,...snap.docs[0].data()}};
  }catch(e){return{success:false,error:e.message};}
};

window.saveDriverPIN=async function(driverId,pin){
  try{
    await db.collection("driver_applications").doc(driverId).update({pin});
    return{success:true};
  }catch(e){return{success:false};}
};

window.acceptRide=async function(bookingId,driverName,driverPlate,driverPhone){
  try{
    await db.collection("bookings").doc(bookingId).update({
      status:"accepted",
      acceptedAt:new Date().toISOString(),
      driverName,driverPlate,driverPhone:driverPhone||""
    });
    return{success:true};
  }catch(e){return{success:false,error:e.message};}
};

window.declineRide=async function(bookingId){
  try{
    await db.collection("bookings").doc(bookingId).update({
      status:"declined",declinedAt:new Date().toISOString()
    });
    return{success:true};
  }catch(e){return{success:false};}
};

window.completeRide=async function(bookingId){
  try{
    await db.collection("bookings").doc(bookingId).update({
      status:"completed",completedAt:new Date().toISOString()
    });
    return{success:true};
  }catch(e){return{success:false};}
};

// Photo upload — base64 fallback (Firebase Storage not needed)
window.uploadPhoto=async function(file,path){
  return new Promise(function(resolve){
    var reader=new FileReader();
    reader.onload=function(ev){resolve({success:true,url:ev.target.result});};
    reader.onerror=function(){resolve({success:false});};
    reader.readAsDataURL(file);
  });
};

var deferredPrompt;
window.addEventListener("beforeinstallprompt",function(e){
  e.preventDefault();deferredPrompt=e;

function installPWA(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;document.getElementById("pwa-banner").style.display="none";});}}
function dismissPWA(){document.getElementById("pwa-banner").style.display="none";localStorage.setItem("pwa_dismissed","1");}

          <button onClick={searchPlace} disabled={searching} style={{padding:"13px 16px",borderRadius:14,border:"none",background:C.gradMain,color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer"}}>

  );

function PassengerRegister({onDone}){
  const[step,setStep]=useState(1);
  const[phone,setPhone]=useState("");
  const[otp,setOtp]=useState("");
  const[generatedOtp,setGeneratedOtp]=useState("");
  const[name,setName]=useState("");
  const[pin,setPin]=useState("");
  const[photo,setPhoto]=useState(null);
  const[photoUrl,setPhotoUrl]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const fileRef=useRef();

  const sendCode=()=>{
    if(phone.replace(/\D/g,"").length<9){setError("Enter a valid Ghana phone number");return;}
    const code=Math.floor(100000+Math.random()*900000).toString();
    setGeneratedOtp(code);setError("");setStep(2);
  };

  const verifyCode=()=>{
    if(otp===generatedOtp){setStep(3);setError("");}
    else setError("Wrong code. Please check and try again.");
  };

  const handlePhoto=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setPhoto(file);
    const r=new FileReader();
    r.onload=ev=>setPhotoUrl(ev.target.result);
    r.readAsDataURL(file);
  };

  const finish=async()=>{
    if(!name.trim()){setError("Please enter your full name");return;}
    if(!photo){setError("Photo is required for identification");return;}
    if(pin.length<4){setError("Please set a 4-digit PIN");return;}
    setLoading(true);setError("");
    try{
      const userData={name:name.trim(),phone:phone.trim(),photoURL:photoUrl,pin,createdAt:new Date().toISOString()};
      await window.savePassenger(userData);
      localStorage.setItem("okada_user",JSON.stringify(userData));
      setLoading(false);
      onDone(userData);
    }catch(e){
      const userData={name:name.trim(),phone:phone.trim(),photoURL:photoUrl,pin,createdAt:new Date().toISOString()};
      localStorage.setItem("okada_user",JSON.stringify(userData));
      setLoading(false);
      onDone(userData);
    }
  };

  const iStyle=(active)=>({
    width:"100%",padding:"15px",borderRadius:14,border:`2px solid ${active?C.primary:C.border}`,
    fontSize:16,fontWeight:600,color:C.text,outline:"none",marginBottom:6,
    transition:"border-color .2s",fontFamily:"'Nunito',sans-serif",background:"#fff"
  });

  return(
    <div style={{minHeight:"100vh",background:C.gradMain,display:"flex",flexDirection:"column",position:"relative",overflow:"hidden"}}>
      <TopStripe/>
      <GhanaMapBg/>
      <div style={{padding:"52px 20px 16px",position:"relative",zIndex:1,flexShrink:0}}>
        <button onClick={()=>onDone(null)} style={{background:"rgba(255,255,255,.15)",border:"none",color:"rgba(255,255,255,.8)",borderRadius:10,padding:"9px 14px",fontWeight:700,fontSize:13,cursor:"pointer",marginBottom:14}}>← Back</button>

          <div style={{width:46,height:46,background:"rgba(255,255,255,.15)",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center"}}><TukTuk size={26} color="#fff"/></div>
          <div>
            <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:900,color:"#fff",lineHeight:1}}>Create Account</h2>
            <p style={{color:"rgba(255,255,255,.55)",fontSize:12,marginTop:2}}>Step {step} of 3 — {step===1?"Verify phone":step===2?"Enter code":"Complete profile"}</p>
          </div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:12}}>
          {[1,2,3].map(s=><div key={s} style={{flex:1,height:4,borderRadius:4,background:step>=s?C.gold:"rgba(255,255,255,.2)",transition:"all .4s"}}/>)}
        </div>

function TripsScreen({user}){
  const[rides,setRides]=useState([]);
  const[loading,setLoading]=useState(true);
  const[locked,setLocked]=useState(true);
  const[pinInput,setPinInput]=useState("");
  const[error,setError]=useState("");

  const unlock=()=>{
    if(pinInput===user.pin){setLocked(false);setError("");}
    else{setError("Wrong PIN");setPinInput("");}
  };

  useEffect(()=>{
    if(!locked){setLoading(true);window.getMyRides(user.phone).then(r=>{setRides(r);setLoading(false);});}
  },[locked]);

  if(locked)return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>📋 Trip History</h2>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>Protected by your PIN</p>
      </div>
      <div style={{padding:"16px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:300}}>
        <Card style={{width:"100%",maxWidth:300,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:10}}>🔐</div>
          <h3 style={{fontWeight:800,fontSize:15,color:C.text,marginBottom:6}}>Enter Your PIN</h3>
          <p style={{color:C.textMid,fontSize:13,marginBottom:14}}>Your trip history is protected</p>
          <input value={pinInput} onChange={e=>setPinInput(e.target.value.replace(/\D/g,"").slice(0,4))}
            type="tel" inputMode="numeric" placeholder="Enter PIN"
            onKeyDown={e=>e.key==="Enter"&&unlock()}
            style={{width:"100%",padding:"13px",borderRadius:12,border:`2px solid ${pinInput.length===4?C.primary:C.border}`,fontSize:22,fontWeight:800,textAlign:"center",letterSpacing:8,marginBottom:10,color:C.text,outline:"none"}}/>
          {error&&<p style={{color:C.red,fontSize:13,fontWeight:700,marginBottom:8}}>{error}</p>}
          <Btn onClick={unlock} disabled={pinInput.length<4}>Unlock 🔓</Btn>
        </Card>
      </div>
    </div>
  );

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 20px",position:"relative"}}>
        <TopStripe/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div><h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff"}}>📋 Trip History</h2><p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>{rides.length} rides</p></div>
          <button onClick={()=>setLocked(true)} style={{background:"rgba(255,255,255,.1)",border:"none",color:"rgba(255,255,255,.6)",borderRadius:10,padding:"7px 12px",fontWeight:700,fontSize:12,cursor:"pointer"}}>🔒 Lock</button>
        </div>
      </div>
      <div style={{padding:"14px 16px"}}>
        {loading&&<div style={{textAlign:"center",padding:28}}><Spinner color={C.primary} size={28}/></div>}
        {!loading&&rides.length===0&&<div style={{textAlign:"center",padding:"40px 20px"}}><p style={{fontSize:36,marginBottom:10}}>🛺</p><p style={{fontWeight:800,fontSize:16,color:C.text}}>No trips yet</p><p style={{color:C.textMid,fontSize:13,marginTop:6}}>Book your first ride!</p></div>}
        {rides.map(r=>(
          <Card key={r.id} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><p style={{fontWeight:800,fontSize:14,color:C.text}}>{r.pickup} → {r.dropoff}</p><p style={{color:C.textMid,fontSize:12,marginTop:2}}>{r.createdAt?.seconds?new Date(r.createdAt.seconds*1000).toLocaleDateString():"Recent"}</p></div>
              <div style={{background:r.status==="completed"?"rgba(0,200,83,.1)":"rgba(255,179,0,.1)",borderRadius:10,padding:"3px 9px"}}><p style={{color:r.status==="completed"?C.success:C.gold,fontWeight:700,fontSize:11,textTransform:"capitalize"}}>{r.status}</p></div>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <p style={{color:C.textMid,fontSize:12}}>🛺 {r.driverName||"Rider"} · {r.region}</p>
              <p style={{fontFamily:"'Syne',sans-serif",fontWeight:800,color:C.primary,fontSize:15}}>GHS {(r.fare||FLAT_FARE).toFixed(2)}</p>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );

function ProfileScreen({user,onSignOut,onUpdate}){
  const[editing,setEditing]=useState(false);
  const[name,setName]=useState(user.name||"");
  const[photo,setPhoto]=useState(null);
  const[photoUrl,setPhotoUrl]=useState(user.photoURL||"");
  const[saving,setSaving]=useState(false);
  const fileRef=useRef();

  const handlePhoto=e=>{const file=e.target.files[0];if(file){setPhoto(file);const r=new FileReader();r.onload=ev=>setPhotoUrl(ev.target.result);r.readAsDataURL(file);}};

  const save=async()=>{
    setSaving(true);
    let finalUrl=photoUrl;
    if(photo){const up=await window.uploadPhoto(photo,"dummy");if(up.success)finalUrl=up.url;}
    const updated={...user,name,photoURL:finalUrl};
    try{await window.savePassenger(updated);}catch(e){}
    localStorage.setItem("okada_user",JSON.stringify(updated));
    onUpdate(updated);setSaving(false);setEditing(false);
  };

  return(
    <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}} className="screen">
      <div style={{background:C.gradMain,padding:"52px 20px 24px",position:"relative",textAlign:"center"}}>
        <TopStripe/>
        <div style={{position:"relative",display:"inline-block",marginBottom:12}}>
          <Avatar src={photoUrl} emoji="🧑🏾" size={76}/>
          {editing&&<button onClick={()=>fileRef.current?.click()} style={{position:"absolute",bottom:0,right:0,width:26,height:26,borderRadius:"50%",background:C.gold,border:"none",cursor:"pointer",fontSize:13}}>📷</button>}
        </div>
        <input ref={fileRef} type="file" accept="image/*" capture="user" onChange={handlePhoto} style={{display:"none"}}/>
        {editing?<input value={name} onChange={e=>setName(e.target.value)} style={{background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.3)",borderRadius:10,padding:"8px 14px",color:"#fff",fontWeight:800,fontSize:17,textAlign:"center",width:"100%",maxWidth:240,outline:"none"}}/>:<h2 style={{fontFamily:"'Syne',sans-serif",fontSize:21,fontWeight:800,color:"#fff"}}>{user.name}</h2>}
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13,marginTop:4}}>📞 {user.phone}</p>
      </div>
      <div style={{padding:"14px 16px"}}>
        <Card style={{marginBottom:14}}>
          {[["📞 Phone",user.phone],["🔐 Trip PIN","••••"],["📅 Member since",user.createdAt?new Date(user.createdAt).toLocaleDateString():"Recent"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
              <p style={{color:C.textMid,fontSize:13,fontWeight:600}}>{l}</p>
              <p style={{color:C.text,fontSize:13,fontWeight:700}}>{v}</p>
            </div>
          ))}
        </Card>
        {editing?<React.Fragment><Btn onClick={save} disabled={saving} style={{marginBottom:8}}>{saving?<Spinner/>:"Save ✓"}</Btn><Btn ghost onClick={()=>{setEditing(false);setName(user.name||"");setPhotoUrl(user.photoURL||"");}}>Cancel</Btn></React.Fragment>
        :<React.Fragment><Btn ghost onClick={()=>setEditing(true)} style={{marginBottom:8}}>✏️ Edit Profile</Btn><Btn danger onClick={onSignOut}>Sign Out</Btn></React.Fragment>}
      </div>
    </div>
  );
}

function App(){
  const[splash,setSplash]=useState(true);
  const[showQuote,setShowQuote]=useState(false);
  const[user,setUser]=useState(()=>{try{const s=localStorage.getItem("okada_user");return s?JSON.parse(s):null;}catch{return null;}});
  const[driverUser,setDriverUser]=useState(()=>{try{const s=localStorage.getItem("okada_driver");return s?JSON.parse(s):null;}catch{return null;}});
  const[authMode,setAuthMode]=useState("login");
  const[tab,setTab]=useState("home");
  const[flow,setFlow]=useState("home");
  const[pickup,setPickup]=useState("");
  const[dropoff,setDropoff]=useState("");
  const[region,setRegion]=useState("");
  const[driver,setDriver]=useState(null);
  const[pay,setPay]=useState("cash");
  const[bookingId,setBookingId]=useState("");
  const[fare,setFare]=useState(FLAT_FARE);

  const resetFlow=()=>{setFlow("home");setPickup("");setDropoff("");setRegion("");setDriver(null);setBookingId("");setFare(FLAT_FARE);};

  useEffect(()=>{
    if(!splash&&(user||driverUser)){
      const today=new Date().toDateString();
      if(localStorage.getItem("okada_quote_day")!==today){
        setShowQuote(true);localStorage.setItem("okada_quote_day",today);
      }
    }
  },[splash,user,driverUser]);

  if(splash)return<SplashScreen onDone={()=>setSplash(false)}/>;

  
  
  const storedDriver = React.useMemo(()=>{
    if(driverUser) return driverUser;
    try{const s=localStorage.getItem("okada_driver");return s?JSON.parse(s):null;}
    catch{return null;}
  },[driverUser]);
  
  if(storedDriver && !driverUser){
    
    React.useEffect(()=>{ setDriverUser(storedDriver); },[]);
  }

  if(driverUser||storedDriver)return(
    <div style={{width:"100%",minHeight:"100vh",background:C.bg}}>
      {showQuote&&<DailyQuoteModal onClose={()=>setShowQuote(false)}/>}
      <DriverDashboard driver={driverUser||storedDriver} onLogout={()=>{localStorage.removeItem("okada_driver");setDriverUser(null);}}/>
    </div>
  );

  
  if(!user&&authMode==="register")return<PassengerRegister onDone={u=>{if(u)setUser(u);else setAuthMode("login");}}/>;
  if(!user)return<UnifiedLogin
    onPassengerLogin={u=>setUser(u)}
    onDriverLogin={d=>{
  try{localStorage.setItem("okada_driver",JSON.stringify(d));}catch(e){}
  setDriverUser(d);
}}
    onRegister={()=>setAuthMode("register")}
  />;

  const isActiveRide=flow==="browsing";

  return(
    <div style={{width:"100%",minHeight:"100vh",background:C.bg,position:"relative"}}>
      {showQuote&&<DailyQuoteModal onClose={()=>setShowQuote(false)}/>}

      {isActiveRide&&(
        <div onClick={()=>setFlow("tracking")} style={{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:200,background:`linear-gradient(135deg,${C.success},#006B2E)`,padding:"12px 16px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,200,83,.4)"}}>
          <div style={{width:9,height:9,borderRadius:"50%",background:"#fff",animation:"ping 1s ease-out infinite",flexShrink:0}}/>
          <div style={{flex:1}}><p style={{color:"#fff",fontWeight:800,fontSize:13}}>🛺 Ride in Progress — {driver?.name||"Rider"}</p><p style={{color:"rgba(255,255,255,.7)",fontSize:11,marginTop:1}}>Tap to return</p></div>
          <span style={{color:"#fff",fontWeight:800,fontSize:16}}>→</span>
        </div>
      )}

      {(flow==="home"||isActiveRide)&&tab==="home"&&<HomeScreen user={user} goBook={(p,d,r,f)=>{setPickup(p);setDropoff(d);setRegion(r);setFare(f||FLAT_FARE);setFlow("booking");}} goSchedule={()=>setFlow("schedule")}/>}
      {(flow==="home"||isActiveRide)&&tab==="trips"&&<TripsScreen user={user}/>}
      {(flow==="home"||isActiveRide)&&tab==="map"&&<MapScreen/>}
      {(flow==="home"||isActiveRide)&&tab==="profile"&&<ProfileScreen user={user} onSignOut={()=>{localStorage.removeItem("okada_user");setUser(null);}} onUpdate={u=>setUser(u)}/>}

      {flow==="schedule"&&<ScheduleScreen user={user} onBack={()=>setFlow("home")} onDone={()=>setFlow("home")}/>}
      {flow==="booking"&&<BookingScreen user={user} pickup={pickup} dropoff={dropoff} region={region} fare={fare} onBack={()=>setFlow("home")} onConfirm={(d,p,bid,f)=>{setDriver(d);setPay(p);setBookingId(bid);setFare(f||fare);setFlow("tracking");}}/>}
      {flow==="tracking"&&<TrackingScreen user={user} bookingId={bookingId} driver={driver} pickup={pickup} dropoff={dropoff} region={region} payMethod={pay} fare={fare} onDriverAccepted={()=>setFlow("ride")} onCancel={resetFlow} onGoHome={()=>setFlow("browsing")}/>}
      {flow==="ride"&&<RideScreen user={user} driver={driver} pickup={pickup} dropoff={dropoff} payMethod={pay} fare={fare} bookingId={bookingId} onEnd={()=>setFlow("payment")} onGoHome={()=>setFlow("browsing")}/>}
      {flow==="payment"&&<PaymentScreen driver={driver} payMethod={pay} fare={fare} bookingId={bookingId} onDone={resetFlow}/>}

      {(flow==="home"||isActiveRide)&&<BottomNav tab={tab} setTab={t=>setTab(t)}/>}
      {(flow==="booking"||flow==="schedule")&&<BottomNav tab={tab} setTab={t=>{setFlow("home");setTab(t);}}/>}
    </div>
  );
}

        🔄 Reload App
      </button>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false};}
  static getDerivedStateFromError(){return{hasError:true};}
  componentDidCatch(error,info){console.error("OkadaRide crash:",error,info);}
  render(){
    if(this.state.hasError)return<ErrorBoundaryFallback/>;
    return this.props.children;
  }
}

const rootEl=document.getElementById("root");
if(rootEl){
  try{
    ReactDOM.createRoot(rootEl).render(
      <ErrorBoundary><App/></ErrorBoundary>
    );

    console.error("Render failed:",e);

  }
}
