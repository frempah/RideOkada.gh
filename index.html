var DB = {
  savePassenger: async function(data){
    try{
      var snap = await db.collection("passengers").where("phone","==",data.phone).get();
      if(!snap.empty){await snap.docs[0].ref.update(Object.assign({},data,{updatedAt:new Date().toISOString()}));return {success:true};}
      await db.collection("passengers").add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return {success:true};
    }catch(e){return {success:false};}
  },
  getPassenger: async function(phone){
    try{
      var snap = await db.collection("passengers").where("phone","==",phone).get();
      if(snap.empty) return null;
      return Object.assign({id:snap.docs[0].id},snap.docs[0].data());
    }catch(e){return null;}
  },
  saveBooking: async function(data){
    try{
      var r = await db.collection("bookings").add(Object.assign({},data,{status:"requested",createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return {success:true,id:r.id};
    }catch(e){return {success:false,id:""};}
  },
  findDriver: async function(plate){
    try{
      var snap = await db.collection("driver_applications").where("plate","==",plate.toUpperCase()).where("status","==","approved").get();
      if(snap.empty) return {success:false,error:"No approved rider found with this plate."};
      return {success:true,driver:Object.assign({id:snap.docs[0].id},snap.docs[0].data())};
    }catch(e){return {success:false,error:e.message};}
  },
  savePin: async function(id,pin){
    try{await db.collection("driver_applications").doc(id).update({pin:pin});return {success:true};}catch(e){return {success:false};}
  },
  watchRiderBookings: function(name,plate,cb){
    try{
      return db.collection("bookings").where("driverName","==",name)
        .onSnapshot(function(snap){cb(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));},function(e){});
    }catch(e){return function(){};}
  },
  watchPlateBookings: function(plate,cb){
    try{
      return db.collection("bookings").where("driverPlate","==",plate)
        .onSnapshot(function(snap){cb(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));},function(e){});
    }catch(e){return function(){};}
  },
  updateBooking: async function(id,data){
    try{await db.collection("bookings").doc(id).update(data);return {success:true};}catch(e){return {success:false};}
  },
  getMyRides: async function(phone){
    try{
      var snap = await db.collection("bookings").where("passengerPhone","==",phone).get();
      return snap.docs.map(function(d){return Object.assign({id:d.id},d.data());})
        .sort(function(a,b){return ((b.createdAt&&b.createdAt.seconds)||0)-((a.createdAt&&a.createdAt.seconds)||0);});
    }catch(e){return [];}
  },

    });
  }
