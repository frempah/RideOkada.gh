window.DB = {
  savePassenger: async function(data){
    try{
      var snap = await db.collection("passengers").where("phone","==",data.phone).get();
      if(!snap.empty){ await snap.docs[0].ref.update(Object.assign({},data,{updatedAt:new Date().toISOString()})); return {success:true,id:snap.docs[0].id}; }
      var r = await db.collection("passengers").add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return {success:true,id:r.id};
    }catch(e){console.error("savePassenger",e);return {success:false};}
  },
  getPassenger: async function(phone){
    try{
      var snap = await db.collection("passengers").where("phone","==",phone).get();
      if(snap.empty) return null;
      return Object.assign({id:snap.docs[0].id},snap.docs[0].data());
    }catch(e){return null;}
  },
  saveBooking: async function(data){
    try{
      var r = await db.collection("bookings").add(Object.assign({},data,{status:"requested",createdAt:firebase.firestore.FieldValue.serverTimestamp()}));
      return {success:true,id:r.id};
    }catch(e){return {success:false};}
  },
  findDriver: async function(plate){
    try{
      var snap = await db.collection("driver_applications").where("plate","==",plate.toUpperCase()).where("status","==","approved").get();
      if(snap.empty) return {success:false,error:"No approved rider found with plate: "+plate};
      return {success:true,driver:Object.assign({id:snap.docs[0].id},snap.docs[0].data())};
    }catch(e){return {success:false,error:e.message};}
  },
  saveDriverPIN: async function(id,pin){
    try{ await db.collection("driver_applications").doc(id).update({pin:pin}); return {success:true}; }catch(e){return {success:false};}
  },
  getDriverBookings: function(name,plate,cb){
    try{
      return db.collection("bookings").where("driverName","==",name).orderBy("createdAt","desc").onSnapshot(function(snap){
        cb(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));
      }, function(e){console.error("getDriverBookings",e);});
    }catch(e){return function(){};}
  },
  getDriverBookingsByPlate: function(plate,cb){
    try{
      return db.collection("bookings").where("driverPlate","==",plate).onSnapshot(function(snap){
        cb(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}));
      }, function(e){});
    }catch(e){return function(){};}
  },
  acceptRide: async function(bookingId,driverName,plate,phone){
    try{ await db.collection("bookings").doc(bookingId).update({status:"accepted",acceptedAt:new Date().toISOString(),driverName:driverName,driverPlate:plate,driverPhone:phone||""}); return {success:true}; }catch(e){return {success:false,error:e.message};}
  },
  declineRide: async function(bookingId){
    try{ await db.collection("bookings").doc(bookingId).update({status:"declined",declinedAt:new Date().toISOString()}); return {success:true}; }catch(e){return {success:false};}
  },
  completeRide: async function(bookingId){
    try{ await db.collection("bookings").doc(bookingId).update({status:"completed",completedAt:new Date().toISOString()}); return {success:true}; }catch(e){return {success:false};}
  },
  watchBooking: function(bookingId,cb){
    try{ return db.collection("bookings").doc(bookingId).onSnapshot(function(snap){ if(snap.exists) cb(Object.assign({id:snap.id},snap.data())); }); }catch(e){return function(){};}
  },
  sendMessage: async function(bookingId,sender,name,text){
    try{ await db.collection("bookings").doc(bookingId).collection("messages").add({sender:sender,senderName:name,text:text,createdAt:firebase.firestore.FieldValue.serverTimestamp()}); return {success:true}; }catch(e){return {success:false};}
  },
  watchMessages: function(bookingId,cb){
    try{ return db.collection("bookings").doc(bookingId).collection("messages").orderBy("createdAt","asc").onSnapshot(function(snap){ cb(snap.docs.map(function(d){return Object.assign({id:d.id},d.data());})); }); }catch(e){return function(){};}
  },
  getMyRides: async function(phone){
    try{
      var snap = await db.collection("bookings").where("passengerPhone","==",phone).get();
      return snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}).sort(function(a,b){return (b.createdAt&&b.createdAt.seconds||0)-(a.createdAt&&a.createdAt.seconds||0);});
    }catch(e){return [];}
  },
  fetchDrivers: async function(region){
    try{
      var snap = await db.collection("driver_applications").where("status","==","approved").get();
      return snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    }catch(e){return [];}
  },
  saveScheduled: async function(data){
    try{ var r = await db.collection("scheduled_bookings").add(Object.assign({},data,{createdAt:firebase.firestore.FieldValue.serverTimestamp()})); return {success:true,id:r.id}; }catch(e){return {success:false};}
  },
  uploadPhoto: async function(file){
    return new Promise(function(resolve){
      var reader = new FileReader();
      reader.onload = function(e){ resolve({success:true,url:e.target.result}); };
      reader.onerror = function(){ resolve({success:false}); };
      reader.readAsDataURL(file);
    });
  }
};

var fmtPhone = function(phone){
  var c = String(phone || "").replace(/[^0-9]/g,"");

};

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  var _splash=useState(true),_user=useState(function(){try{var s=localStorage.getItem("okada_user");return s?JSON.parse(s):null;}catch(e){return null;}}),_driver=useState(function(){try{var s=localStorage.getItem("okada_driver");return s?JSON.parse(s):null;}catch(e){return null;}}),_mode=useState("login"),_tab=useState("home"),_flow=useState("home"),_pu=useState(""),_do=useState(""),_rg=useState(""),_dr=useState(null),_pay=useState("cash"),_bid=useState(""),_fare=useState(FLAT_FARE),_quote=useState(false);

  var splash=_splash[0],setSplash=_splash[1];
  var user=_user[0],setUser=_user[1];
  var driver=_driver[0],setDriver=_driver[1];
  var mode=_mode[0],setMode=_mode[1];
  var tab=_tab[0],setTab=_tab[1];
  var flow=_flow[0],setFlow=_flow[1];
  var pickup=_pu[0],setPickup=_pu[1];
  var dropoff=_do[0],setDropoff=_do[1];
  var region=_rg[0],setRegion=_rg[1];
  var selDriver=_dr[0],setSelDriver=_dr[1];
  var pay=_pay[0],setPay=_pay[1];
  var bookingId=_bid[0],setBookingId=_bid[1];
  var fare=_fare[0],setFare=_fare[1];
  var showQuote=_quote[0],setShowQuote=_quote[1];

  var reset=function(){setFlow("home");setPickup("");setDropoff("");setRegion("");setSelDriver(null);setBookingId("");setFare(FLAT_FARE);};

  useEffect(function(){
    if(!splash&&(user||driver)){
      var today=new Date().toDateString();
      if(localStorage.getItem("okada_quote_day")!==today){setShowQuote(true);localStorage.setItem("okada_quote_day",today);}
    }
  },[splash,user,driver]);

  if(splash) return h(SplashScreen,{onDone:function(){setSplash(false);}});

  // Daily quote modal
  var QuoteModal = showQuote ? h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:22},onClick:function(){setShowQuote(false);}},
    h("div",{onClick:function(e){e.stopPropagation();},style:{background:"#fff",borderRadius:22,padding:26,maxWidth:340,width:"100%",position:"relative",overflow:"hidden",animation:"slideUp .4s ease"}},
      h(TopStripe,null),
      h("div",{style:{textAlign:"center",paddingTop:6}},
        h("div",{style:{width:56,height:56,background:GRAD,borderRadius:17,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 13px",fontSize:26}},"🛡️"),
        h("p",{style:{fontSize:11,fontWeight:800,color:"#85A88C",letterSpacing:2,textTransform:"uppercase",marginBottom:10}},"Daily Safety Quote"),
        h("p",{style:{fontFamily:"'Syne',sans-serif",fontSize:17,fontWeight:800,color:"#0D2E14",lineHeight:1.4,marginBottom:10}},'"'+getQuote()+'"'),
        h("p",{style:{color:"#3D6645",fontSize:13,fontWeight:600,marginBottom:17}},"— OkadaRide Ghana"),
        h(Btn,{onClick:function(){setShowQuote(false);}},"Start My Ride 🛺")
      )
    )
  ) : null;

  // Driver dashboard
  if(driver) return h("div",null,
    QuoteModal,
    h(RiderDashboard,{driver:driver,onLogout:function(){localStorage.removeItem("okada_driver");setDriver(null);}})
  );

  // Auth
  if(mode==="register") return h(PassengerRegister,{onDone:function(u){if(u){setUser(u);setMode("login");}else setMode("login");}});
  if(!user) return h(LoginScreen,{
    onPassengerLogin:function(u){setUser(u);},
    onRider:function(d){setDriver(d);},
    onRegister:function(){setMode("register");}
  });

  // Main passenger app
  var isBrowsing = flow==="browsing";
  var isFlow = flow==="booking"||flow==="schedule";

  return h("div",{style:{width:"100%",minHeight:"100vh",background:BG,position:"relative"}},
    QuoteModal,
    // Active ride banner
    isBrowsing && h("div",{onClick:function(){setFlow("tracking");},style:{position:"fixed",top:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,zIndex:200,background:"linear-gradient(135deg,#00C853,#006B2E)",padding:"11px 15px",display:"flex",alignItems:"center",gap:9,cursor:"pointer",boxShadow:"0 4px 14px rgba(0,200,83,.4)"}},
      h("div",{style:{width:9,height:9,borderRadius:"50%",background:"#fff",animation:"ping 1s ease-out infinite",flexShrink:0}}),
      h("div",{style:{flex:1}},h("p",{style:{color:"#fff",fontWeight:800,fontSize:13}},"🛺 Ride in Progress — "+(selDriver&&selDriver.name||"Rider")),h("p",{style:{color:"rgba(255,255,255,.7)",fontSize:11,marginTop:1}},"Tap to return")),
      h("span",{style:{color:"#fff",fontWeight:800,fontSize:15}},"→")
    ),
    // Passenger tabs
    (flow==="home"||isBrowsing)&&tab==="home" && h(HomeScreen,{user:user,goBook:function(p,d,r,f){setPickup(p);setDropoff(d);setRegion(r);setFare(f||FLAT_FARE);setFlow("booking");},goSchedule:function(){setFlow("schedule");}}),
    (flow==="home"||isBrowsing)&&tab==="trips" && h(TripsScreen,{user:user}),
    (flow==="home"||isBrowsing)&&tab==="map" && h(MapScreen,null),
    (flow==="home"||isBrowsing)&&tab==="profile" && h("div",{style:{paddingBottom:80,background:BG,minHeight:"100vh"},className:"screen"},
      h(ProfileScreen,{user:user,onSignOut:function(){localStorage.removeItem("okada_user");setUser(null);},onUpdate:function(u){setUser(u);}})
    ),
    flow==="schedule" && h(ScheduleScreen,{user:user,onBack:function(){setFlow("home");},onDone:function(){setFlow("home");}}),
    flow==="booking" && h(BookingScreen,{user:user,pickup:pickup,dropoff:dropoff,region:region,fare:fare,onBack:function(){setFlow("home");},onConfirm:function(d,p,bid,f){setSelDriver(d);setPay(p);setBookingId(bid);setFare(f||fare);setFlow("tracking");}}),
    flow==="tracking" && h(TrackingScreen,{user:user,bookingId:bookingId,driver:selDriver,pickup:pickup,dropoff:dropoff,region:region,payMethod:pay,fare:fare,onAccepted:function(){setFlow("ride");},onGoHome:function(){setFlow("browsing");},onCancel:reset}),
    flow==="ride" && h(RideScreen,{user:user,driver:selDriver,pickup:pickup,dropoff:dropoff,payMethod:pay,fare:fare,bookingId:bookingId,onEnd:function(){setFlow("payment");},onGoHome:function(){setFlow("browsing");}}),
    flow==="payment" && h(PaymentScreen,{driver:selDriver,payMethod:pay,fare:fare,bookingId:bookingId,onDone:reset}),
    (flow==="home"||isBrowsing) && h(BottomNav,{tab:tab,setTab:setTab}),
    isFlow && h(BottomNav,{tab:tab,setTab:function(t){setFlow("home");setTab(t);}})
  );
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener("load",function(){
  var root = document.getElementById("root");
  try{
    ReactDOM.createRoot(root).render(React.createElement(App));
  }catch(e){
    console.error("Boot error:",e);
    root.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0D4A1A;padding:24px;text-align:center"><div style="font-size:48px;margin-bottom:14px">🛺</div><h2 style="color:#fff;font-family:sans-serif;font-size:20px;margin-bottom:9px">OkadaRide Ghana</h2><p style="color:rgba(255,255,255,.6);font-size:13px;margin-bottom:20px">App failed to start. Please reload.</p><button onclick="window.location.reload()" style="background:#FFB300;border:none;border-radius:13px;padding:13px 24px;color:#000;font-weight:800;font-size:15px;cursor:pointer">🔄 Reload</button></div>';
  }
});
</script>
</body>
</html>
